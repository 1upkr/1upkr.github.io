<html lang="ko" data-theme="dark">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1up kr :: ⚾ 레전드 스카우트 🏟️</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --bg:#f4f2ee;--surface:#faf9f6;--surface-2:#fff;--surface-off:#eeebe5;--surface-dyn:#e4e1db;
  --border:#d8d4cc;--divider:#e8e5df;
  --text:#1e1c18;--text-m:#706d66;--text-f:#b0ada6;
  --primary:#c8372d;--primary-h:#a82820;--primary-hl:#fae8e7;
  --gold:#d4920a;--green:#2e7d32;--blue:#1565c0;
  --sh-sm:0 1px 3px oklch(0.2 0.02 50/.07);--sh-md:0 4px 16px oklch(0.2 0.02 50/.10);--sh-lg:0 12px 36px oklch(0.2 0.02 50/.14);
  --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-2xl:1.5rem;--r-full:9999px;
  --font:'Satoshi',sans-serif;--tr:200ms cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
  --bg:#141210;--surface:#1a1917;--surface-2:#201e1c;--surface-off:#1d1b19;--surface-dyn:#2a2825;
  --border:#3a3733;--divider:#252320;
  --text:#e8e5e0;--text-m:#8a8781;--text-f:#55524e;
  --primary:#e8534a;--primary-h:#f06b62;--primary-hl:#3d1f1d;
  --gold:#f0b429;--green:#66bb6a;--blue:#64b5f6;
  --sh-sm:0 1px 3px #00000040;--sh-md:0 4px 16px #00000050;--sh-lg:0 12px 36px #00000060;
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font);font-size:16px;color:var(--text);background:var(--bg);line-height:1.6}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;transition:all var(--tr)}

/* ── Layout ── */
.wrap{max-width:720px;margin:0 auto;padding:24px 16px 48px}

/* ── Header ── */
.header{text-align:center;margin-bottom:32px}
.header-title{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:900;letter-spacing:-.03em;line-height:1.1;margin-bottom:6px}
.header-sub{font-size:.875rem;color:var(--text-m)}
.theme-row{display:flex;justify-content:flex-end;margin-bottom:12px}
.theme-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-full);color:var(--text-m);border:1px solid var(--border)}
.theme-btn:hover{background:var(--surface-dyn);color:var(--text)}

/* ── Stadium grid ── */
.section-label{font-size:.72rem;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.stadium-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:28px}
@media(max-width:480px){.stadium-grid{grid-template-columns:repeat(3,1fr)}}
.stadium-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:var(--r-xl);background:var(--surface);border:2px solid var(--border);transition:all var(--tr)}
.stadium-btn:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--sh-sm)}
.stadium-btn.selected{border-color:var(--primary);background:var(--primary-hl);box-shadow:var(--sh-md)}
.st-emoji{font-size:1.6rem;line-height:1}
.st-name{font-size:.72rem;font-weight:700;text-align:center;line-height:1.2}
.st-team{font-size:.65rem;color:var(--text-m);text-align:center}

/* ── Scout button ── */
.scout-btn{width:100%;padding:16px;background:var(--primary);color:#fff;font-size:1.05rem;font-weight:700;border-radius:var(--r-2xl);box-shadow:var(--sh-md);margin-bottom:28px;letter-spacing:-.01em;position:relative;overflow:hidden}
.scout-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%)}
.scout-btn:hover:not(:disabled){background:var(--primary-h);transform:translateY(-2px);box-shadow:var(--sh-lg)}
.scout-btn:active:not(:disabled){transform:none}
.scout-btn:disabled{opacity:.38;cursor:not-allowed;transform:none}

/* ── Result area ── */
.result-area{min-height:160px;display:flex;align-items:center;justify-content:center;margin-bottom:28px}
.result-empty{color:var(--text-f);font-size:.9rem;text-align:center;padding:24px}
.result-card{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-2xl);padding:24px;box-shadow:var(--sh-md);animation:pop .38s cubic-bezier(.16,1,.3,1)}
@keyframes pop{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:none}}
.result-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.result-stadium{font-size:.75rem;font-weight:700;color:var(--text-m);display:flex;align-items:center;gap:4px}
.result-prob-badge{font-size:.72rem;padding:3px 10px;border-radius:var(--r-full);font-weight:700}
.prob-high{background:color-mix(in oklab,var(--gold) 18%,var(--surface-off));color:var(--gold)}
.prob-normal{background:var(--surface-dyn);color:var(--text-m)}
.result-player{font-size:clamp(1.8rem,6vw,2.6rem);font-weight:900;letter-spacing:-.03em;margin-bottom:8px;line-height:1.1}
.result-sub{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:var(--r-full)}
.badge-team{background:color-mix(in oklab,var(--blue) 14%,var(--surface-off));color:var(--blue)}
.badge-hist{background:color-mix(in oklab,var(--green) 14%,var(--surface-off));color:var(--green)}

/* ── Rolling ── */
.rolling-card{width:100%;background:var(--surface-2);border:2px solid var(--primary);border-radius:var(--r-2xl);padding:24px;text-align:center;box-shadow:var(--sh-lg)}
.rolling-name{font-size:clamp(1.6rem,5vw,2.2rem);font-weight:900;letter-spacing:-.03em;opacity:.5;animation:flicker .12s steps(1) infinite}
@keyframes flicker{0%{opacity:.3}50%{opacity:.9}100%{opacity:.3}}

/* ── Odds table ── */
.odds-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:28px}
.odds-header{padding:12px 16px;border-bottom:1px solid var(--divider);display:flex;align-items:center;justify-content:space-between;gap:8px}
.odds-title{font-size:.8rem;font-weight:700}
.odds-sub{font-size:.72rem;color:var(--text-m)}
.odds-body{padding:12px 16px;display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
.odds-body::-webkit-scrollbar{width:4px}
.odds-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--r-full)}
.odds-row{display:flex;align-items:center;gap:10px}
.odds-bar-wrap{flex:1;display:flex;align-items:center;gap:6px}
.odds-bar{height:6px;background:var(--surface-dyn);border-radius:var(--r-full);flex:1;overflow:hidden}
.odds-bar-fill{height:100%;border-radius:var(--r-full);transition:width .5s cubic-bezier(.16,1,.3,1)}
.fill-high{background:linear-gradient(90deg,var(--primary),var(--gold))}
.fill-norm{background:var(--text-f)}
.odds-name{font-size:.75rem;font-weight:600;min-width:52px}
.odds-team{font-size:.68rem;color:var(--text-m);min-width:36px}
.odds-pct{font-size:.72rem;font-weight:700;min-width:42px;text-align:right;font-variant-numeric:tabular-nums}

/* ── History ── */
.hist-section{border-top:1px solid var(--divider);padding-top:20px}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.clear-btn{font-size:.75rem;color:var(--text-m);padding:4px 8px;border-radius:var(--r-sm)}
.clear-btn:hover{color:var(--primary)}
.hist-list{display:flex;flex-direction:column;gap:6px}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);animation:pop .2s ease}
.hist-num{font-size:.68rem;color:var(--text-f);min-width:18px;text-align:right}
.hist-emoji{font-size:1rem}
.hist-player{font-size:.875rem;font-weight:700;flex:1}
.hist-meta{font-size:.72rem;color:var(--text-m)}
.hist-pct{font-size:.68rem;color:var(--text-f);font-variant-numeric:tabular-nums}
.hist-empty{font-size:.875rem;color:var(--text-f);text-align:center;padding:20px}
</style>
</head>

// Build stadium buttons
const grid = document.getElementById('stadiumGrid');
STADIUMS.forEach(s => {
  const b = document.createElement('button');
  b.className = 'stadium-btn'; b.dataset.id = s.id;
  b.innerHTML = `<span class="st-emoji">${s.emoji}</span><span class="st-name">${s.name}</span><span class="st-team">${s.team}</span>`;
  b.addEventListener('click', () => selectStadium(s));
  grid.appendChild(b);
});

let selStadium = null, hist = [], rolling = false;

function selectStadium(s) {
  selStadium = s;
  document.querySelectorAll('.stadium-btn').forEach(b => b.classList.toggle('selected', b.dataset.id === s.id));
  const btn = document.getElementById('scoutBtn');
  btn.disabled = false;
  btn.textContent = `${s.emoji} ${s.name}(${s.team}) 레전드 뽑기! 🎉`;
  renderOdds(s.id);
}

function renderOdds(sid) {
  const players = DATA[sid];
  const maxP = Math.max(...players.map(p => p.p));
  document.getElementById('oddsTitle').textContent = `🎲 선수 확률 목록 (총 ${players.length}명)`;
  const st = STADIUMS.find(s => s.id === sid);
  const homeLabel = players.filter(p => p.p > 1).map(p => p.t).filter((v,i,a)=>a.indexOf(v)===i).join('·');
  document.getElementById('oddsSub').textContent = homeLabel ? `홈 보너스: ${homeLabel}` : '';
  document.getElementById('oddsBody').innerHTML = players.map(p => {
    const isHigh = p.p > 1;
    return `<div class="odds-row">
      <span class="odds-name">${p.n}</span>
      <span class="odds-team">${p.t}</span>
      <div class="odds-bar-wrap">
        <div class="odds-bar"><div class="odds-bar-fill ${isHigh?'fill-high':'fill-norm'}" style="width:${(p.p/maxP*100).toFixed(1)}%"></div></div>
        <span class="odds-pct" style="color:${isHigh?'var(--gold)':'var(--text-f)'}">${p.p.toFixed(2)}%</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('oddsWrap').style.display = '';
}

// Scout
document.getElementById('scoutBtn').addEventListener('click', doScout);
function doScout() {
  if (!selStadium || rolling) return;
  rolling = true;
  document.getElementById('scoutBtn').disabled = true;
  const pool = DATA[selStadium.id];
  const area = document.getElementById('resultArea');
  let n = 0;
  const iv = setInterval(() => {
    const rp = pool[Math.floor(Math.random() * pool.length)];
    area.innerHTML = `<div class="rolling-card"><div style="font-size:2rem;margin-bottom:8px">${selStadium.emoji}</div><div class="rolling-name">${rp.n}</div><div style="font-size:.8rem;color:var(--text-m);margin-top:6px">${rp.t}</div></div>`;
    if (++n >= 20) { clearInterval(iv); finalize(pool); }
  }, 75);
}

function finalize(pool) {
  // weighted random
  const total = pool.reduce((s,p) => s + p.p, 0);
  let r = Math.random() * total, picked = pool[pool.length-1];
  for (const p of pool) { r -= p.p; if (r <= 0) { picked = p; break; } }
  showResult(picked);
  hist.unshift({player:picked, stadium:selStadium});
  renderHist();
  rolling = false;
  const btn = document.getElementById('scoutBtn');
  btn.disabled = false;
  btn.textContent = `${selStadium.emoji} ${selStadium.name}(${selStadium.team}) 레전드 뽑기! 🎉`;
}

function showResult(p) {
  const isHigh = p.p > 1;
  document.getElementById('resultArea').innerHTML = `
    <div class="result-card">
      <div class="result-top">
        <div class="result-stadium">${selStadium.emoji} ${selStadium.name} · ${selStadium.team} 홈구장</div>
        <span class="result-prob-badge ${isHigh?'prob-high':'prob-normal'}">${isHigh?'🌟 홈 보너스':'일반'} ${p.p.toFixed(2)}%</span>
      </div>
      <div class="result-player">⭐ ${p.n}</div>
      <div class="result-sub">
        <span class="badge badge-team">🏟️ ${p.t}</span>
        <span class="badge badge-hist">레전드 획득!</span>
      </div>
    </div>`;
}

function renderHist() {
  const el = document.getElementById('histList');
  if (!hist.length) { el.innerHTML = '<div class="hist-empty">아직 뽑은 선수가 없어요 😊</div>'; return; }
  el.innerHTML = hist.slice(0,20).map((h,i) =>
    `<div class="hist-item">
      <span class="hist-num">${hist.length-i}</span>
      <span class="hist-emoji">${h.stadium.emoji}</span>
      <span class="hist-player">${h.player.n}</span>
      <span class="hist-meta">${h.player.t} · ${h.stadium.name}</span>
      <span class="hist-pct">${h.player.p.toFixed(2)}%</span>
    </div>`).join('');
}

document.getElementById('clearBtn').addEventListener('click', () => { hist=[]; renderHist(); });

// Theme
(function(){
  const btn=document.querySelector('[data-theme-toggle]'),root=document.documentElement;
  let d=root.getAttribute('data-theme')||'dark';
  btn.textContent=d==='dark'?'☀️':'🌙';
  btn.addEventListener('click',()=>{d=d==='dark'?'light':'dark';root.setAttribute('data-theme',d);btn.textContent=d==='dark'?'☀️':'🌙';});
})();
</script>
