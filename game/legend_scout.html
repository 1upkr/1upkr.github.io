<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1up.kr :: 레전드 스카우트</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-primary-highlight:#cedcd8;
  --color-gold:#d19900;--color-success:#437a22;
  --color-error:#a12c7b;--color-orange:#da7101;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;--space-5:1.25rem;
  --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --font-body:'Satoshi',sans-serif;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-primary-highlight:#313b3b;
  --color-gold:#e8af34;--color-success:#6daa45;
  --color-error:#d163a7;--color-orange:#fdab43;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.2);
  --shadow-md:0 4px 12px oklch(0 0 0/0.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.4);
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);line-height:1.6}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;transition:color var(--transition),background var(--transition),box-shadow var(--transition),transform var(--transition)}

.app{max-width:960px;margin:0 auto;padding:var(--space-6) var(--space-4)}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-8);padding-bottom:var(--space-4);border-bottom:1px solid var(--color-border)}
.logo{display:flex;align-items:center;gap:var(--space-3)}
.logo-icon{width:36px;height:36px}
.logo-text{font-size:var(--text-lg);font-weight:700;letter-spacing:-0.02em}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:-2px}
.theme-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--color-text-muted)}
.theme-btn:hover{background:var(--color-surface-dynamic);color:var(--color-text)}

/* Tabs */
.tabs{display:flex;gap:var(--space-1);background:var(--color-surface);border-radius:var(--radius-xl);padding:var(--space-1);margin-bottom:var(--space-6);border:1px solid var(--color-border)}
.tab-btn{flex:1;padding:var(--space-2) var(--space-4);border-radius:calc(var(--radius-xl) - 4px);font-size:var(--text-sm);font-weight:600;color:var(--color-text-muted);transition:all var(--transition)}
.tab-btn.active{background:var(--color-primary);color:#fff;box-shadow:var(--shadow-sm)}
.tab-btn:hover:not(.active){color:var(--color-text);background:var(--color-surface-dynamic)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Section label */
.section-label{font-size:var(--text-xs);font-weight:700;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:var(--space-3)}

/* Team grid */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:var(--space-2);margin-bottom:var(--space-6)}
.team-btn{padding:var(--space-3) var(--space-2);border-radius:var(--radius-lg);background:var(--color-surface);border:1.5px solid var(--color-border);display:flex;flex-direction:column;align-items:center;gap:var(--space-1);transition:all var(--transition)}
.team-btn:hover{border-color:var(--color-primary);box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.team-btn.selected{border-color:var(--color-primary);background:var(--color-primary-highlight);box-shadow:var(--shadow-md)}
.team-emoji{font-size:1.75rem;line-height:1}
.team-name{font-size:var(--text-xs);font-weight:600;text-align:center}
.team-count{font-size:var(--text-xs);color:var(--color-text-muted)}

/* Prob info */
.prob-info{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4);margin-bottom:var(--space-6);display:flex;gap:var(--space-4);flex-wrap:wrap}
.prob-box{flex:1;min-width:130px;background:var(--color-surface-offset);border-radius:var(--radius-md);padding:var(--space-3)}
.prob-value{font-size:var(--text-xl);font-weight:700;color:var(--color-primary)}
.prob-label{font-size:var(--text-xs);color:var(--color-text-muted)}
.prob-detail{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:2px}

/* Scout btn */
.scout-btn{width:100%;padding:var(--space-4) var(--space-6);background:var(--color-primary);color:#fff;font-size:var(--text-base);font-weight:700;border-radius:var(--radius-xl);box-shadow:var(--shadow-md);margin-bottom:var(--space-8);letter-spacing:-0.01em}
.scout-btn:hover:not(:disabled){background:var(--color-primary-hover);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.scout-btn:active:not(:disabled){transform:translateY(0)}
.scout-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* Result */
.result-area{min-height:160px;display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-8)}
.result-empty{color:var(--color-text-faint);font-size:var(--text-sm);text-align:center}
.result-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-6);width:100%;animation:resultPop 0.35s cubic-bezier(0.16,1,0.3,1)}
@keyframes resultPop{from{opacity:0;transform:scale(0.92) translateY(8px)}to{opacity:1;transform:none}}
.result-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--space-4);flex-wrap:wrap;gap:var(--space-2)}
.result-team{display:flex;align-items:center;gap:var(--space-2)}
.result-team-emoji{font-size:2rem}
.result-team-name{font-size:var(--text-sm);font-weight:600;color:var(--color-text-muted)}
.result-source{font-size:var(--text-xs);padding:2px var(--space-3);border-radius:var(--radius-full);font-weight:600}
.source-selected{background:var(--color-primary-highlight);color:var(--color-primary)}
.source-other{background:var(--color-surface-dynamic);color:var(--color-text-muted)}
.result-player{font-size:var(--text-xl);font-weight:700;letter-spacing:-0.02em;margin-bottom:var(--space-2)}
.result-badges{display:flex;gap:var(--space-2);flex-wrap:wrap}
.badge{font-size:var(--text-xs);font-weight:600;padding:2px var(--space-2);border-radius:var(--radius-full)}
.badge-pitcher{background:color-mix(in oklab,var(--color-orange) 15%,var(--color-surface-offset));color:var(--color-orange)}
.badge-batter{background:color-mix(in oklab,var(--color-success) 15%,var(--color-surface-offset));color:var(--color-success)}
.badge-org{background:var(--color-surface-dynamic);color:var(--color-text-muted)}
.badge-unwanted{background:color-mix(in oklab,var(--color-error) 15%,var(--color-surface-offset));color:var(--color-error)}

/* History */
.history-section{border-top:1px solid var(--color-divider);padding-top:var(--space-6)}
.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-4)}
.clear-btn{font-size:var(--text-xs);color:var(--color-text-muted);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm)}
.clear-btn:hover{color:var(--color-error);background:color-mix(in oklab,var(--color-error) 10%,var(--color-surface))}
.history-list{display:flex;flex-direction:column;gap:var(--space-2)}
.history-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3);background:var(--color-surface);border-radius:var(--radius-md);border:1px solid var(--color-border);animation:resultPop 0.25s cubic-bezier(0.16,1,0.3,1)}
.history-num{font-size:var(--text-xs);color:var(--color-text-faint);min-width:20px;text-align:right}
.history-emoji{font-size:1.1rem}
.history-player{font-size:var(--text-sm);font-weight:600;flex:1}
.history-meta{font-size:var(--text-xs);color:var(--color-text-muted)}
.history-source-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-selected{background:var(--color-primary)}
.dot-other{background:var(--color-text-faint)}
.history-empty{font-size:var(--text-sm);color:var(--color-text-faint);text-align:center;padding:var(--space-6)}
.history-unwanted{opacity:0.45;text-decoration:line-through}

/* === EXCLUDE TAB === */
.exclude-layout{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6)}
@media(max-width:640px){.exclude-layout{grid-template-columns:1fr}}
.team-filter-tabs{display:flex;flex-wrap:wrap;gap:var(--space-1);margin-bottom:var(--space-3)}
.filter-tab{font-size:var(--text-xs);padding:var(--space-1) var(--space-2);border-radius:var(--radius-full);border:1px solid var(--color-border);color:var(--color-text-muted);background:var(--color-surface);transition:all var(--transition)}
.filter-tab.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
.filter-tab:hover:not(.active){border-color:var(--color-primary);color:var(--color-text)}
.player-list{display:flex;flex-direction:column;gap:var(--space-1);max-height:420px;overflow-y:auto;padding-right:var(--space-1)}
.player-list::-webkit-scrollbar{width:4px}
.player-list::-webkit-scrollbar-track{background:transparent}
.player-list::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:var(--radius-full)}
.player-item{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface);cursor:pointer;transition:all var(--transition);user-select:none}
.player-item:hover{border-color:var(--color-primary);background:var(--color-surface-dynamic)}
.player-item.excluded{border-color:var(--color-error);background:color-mix(in oklab,var(--color-error) 8%,var(--color-surface))}
.player-item-check{width:16px;height:16px;border-radius:var(--radius-sm);border:1.5px solid var(--color-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.player-item.excluded .player-item-check{background:var(--color-error);border-color:var(--color-error)}
.player-item-name{font-size:var(--text-sm);font-weight:500;flex:1}
.player-item-role{font-size:var(--text-xs);color:var(--color-text-muted)}
.player-item-team{font-size:var(--text-xs)}

/* Excluded tags panel */
.excluded-panel{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4)}
.excluded-tags{display:flex;flex-wrap:wrap;gap:var(--space-2);min-height:40px;margin-bottom:var(--space-4)}
.excluded-tag{display:flex;align-items:center;gap:var(--space-1);padding:var(--space-1) var(--space-3);background:color-mix(in oklab,var(--color-error) 12%,var(--color-surface));border:1px solid color-mix(in oklab,var(--color-error) 25%,var(--color-border));border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;color:var(--color-error);animation:resultPop 0.2s ease}
.excluded-tag-remove{cursor:pointer;opacity:0.6;font-size:14px;line-height:1;margin-left:2px;border-radius:50%;padding:1px 3px}
.excluded-tag-remove:hover{opacity:1;background:color-mix(in oklab,var(--color-error) 20%,transparent)}
.excluded-count{font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-3)}
.clear-all-btn{font-size:var(--text-xs);color:var(--color-text-muted);padding:var(--space-1) var(--space-3);border-radius:var(--radius-sm);border:1px solid var(--color-border);background:var(--color-surface)}
.clear-all-btn:hover{color:var(--color-error);border-color:var(--color-error)}

/* Probability table */
.prob-table-wrap{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);overflow:hidden;margin-top:var(--space-6)}
.prob-table-header{padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-2)}
.prob-table-title{font-size:var(--text-sm);font-weight:700}
.prob-table-sub{font-size:var(--text-xs);color:var(--color-text-muted)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--color-surface-offset)}
th{padding:var(--space-3) var(--space-4);text-align:left;font-size:var(--text-xs);font-weight:700;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap}
th.right,td.right{text-align:right}
th.center,td.center{text-align:center}
tbody tr{border-top:1px solid var(--color-divider);transition:background var(--transition)}
tbody tr:hover{background:var(--color-surface-dynamic)}
tbody tr.rank-1{background:color-mix(in oklab,var(--color-primary) 6%,var(--color-surface))}
tbody tr.rank-1:hover{background:color-mix(in oklab,var(--color-primary) 10%,var(--color-surface))}
td{padding:var(--space-3) var(--space-4);font-size:var(--text-sm)}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:var(--text-xs);font-weight:700}
.rank-1 .rank-badge{background:var(--color-gold);color:#1a1200}
.rank-2 .rank-badge{background:var(--color-surface-dynamic);color:var(--color-text)}
.rank-3 .rank-badge{background:color-mix(in oklab,var(--color-orange) 30%,var(--color-surface-offset));color:var(--color-orange)}
.rank-other .rank-badge{background:var(--color-surface-offset);color:var(--color-text-muted)}
.prob-bar-wrap{display:flex;align-items:center;gap:var(--space-2)}
.prob-bar{height:6px;border-radius:var(--radius-full);background:var(--color-surface-dynamic);flex:1;overflow:hidden;min-width:50px}
.prob-bar-fill{height:100%;border-radius:var(--radius-full);transition:width 0.6s cubic-bezier(0.16,1,0.3,1)}
.fill-total{background:var(--color-primary)}
.fill-pitcher{background:var(--color-orange)}
.fill-batter{background:var(--color-success)}
.prob-num{font-size:var(--text-xs);font-weight:600;min-width:42px;text-align:right;font-variant-numeric:tabular-nums}
.zero-prob{color:var(--color-text-faint)}
.team-cell{display:flex;align-items:center;gap:var(--space-2)}
.team-cell-emoji{font-size:1.1rem}
.team-cell-name{font-weight:600}
.unwanted-chip{display:inline-block;font-size:10px;padding:1px 5px;border-radius:var(--radius-full);background:color-mix(in oklab,var(--color-error) 15%,var(--color-surface-offset));color:var(--color-error);margin-left:var(--space-1);vertical-align:middle}
.no-exclude-msg{padding:var(--space-6);text-align:center;color:var(--color-text-muted);font-size:var(--text-sm)}

/* Rolling */
.rolling{animation:roll 0.08s steps(1) infinite}
@keyframes roll{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}

@media(max-width:540px){
  .teams-grid{grid-template-columns:repeat(3,1fr)}
  .prob-info{flex-direction:column}
  th,td{padding:var(--space-2) var(--space-3)}
  .prob-bar{min-width:30px}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none" aria-label="레전드 스카우트">
        <circle cx="18" cy="18" r="16" fill="var(--color-primary)" opacity="0.15"/>
        <path d="M18 6 L21 14 L30 14 L23 19 L25 28 L18 23 L11 28 L13 19 L6 14 L15 14 Z" fill="var(--color-primary)"/>
      </svg>
      <div>
        <div class="logo-text">레전드 스카우트</div>
        <div class="logo-sub">컴투스프로야구 2026</div>
      </div>
    </div>
    <button class="theme-btn" data-theme-toggle aria-label="테마 전환">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <!-- Tabs -->
  <div class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="scout" role="tab">🎯 스카우트</button>
    <button class="tab-btn" data-tab="exclude" role="tab">🚫 제외 선수</button>
    <button class="tab-btn" data-tab="analysis" role="tab">📊 확률 분석</button>
  </div>

  <!-- SCOUT TAB -->
  <div id="tab-scout" class="tab-panel active">
    <div class="section-label">구단 선택</div>
    <div class="teams-grid" id="teamsGrid"></div>
    <div class="prob-info">
      <div class="prob-box">
        <div class="prob-value" id="probSelected">—</div>
        <div class="prob-label">선택 구단 확률</div>
        <div class="prob-detail" id="probSelectedDetail">구단을 먼저 선택하세요</div>
      </div>
      <div class="prob-box">
        <div class="prob-value" id="probOtherValue" style="color:var(--color-text-muted)">45%</div>
        <div class="prob-label" id="probOtherLabel">타 구단 확률</div>
        <div class="prob-detail" id="probOtherDetail">나머지 선수 중 무작위</div>
      </div>
      <div class="prob-box">
        <div class="prob-value" id="probPool">62명</div>
        <div class="prob-label">유효 레전드 풀</div>
        <div class="prob-detail" id="probPoolDetail">제외 선수 0명</div>
      </div>
    </div>
    <button class="scout-btn" id="scoutBtn" disabled>구단을 먼저 선택해주세요</button>
    <div class="result-area" id="resultArea">
      <div class="result-empty">구단을 선택하고 스카우트 버튼을 누르세요</div>
    </div>
    <div class="history-section">
      <div class="history-header">
        <div class="section-label" style="margin:0">스카우트 기록</div>
        <button class="clear-btn" id="clearHistoryBtn">초기화</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">아직 스카우트 기록이 없습니다</div>
      </div>
    </div>
  </div>

  <!-- EXCLUDE TAB -->
  <div id="tab-exclude" class="tab-panel">
    <div class="exclude-layout">
      <div>
        <div class="section-label">선수 목록 (클릭하여 제외)</div>
        <div class="team-filter-tabs" id="filterTabs"></div>
        <div class="player-list" id="playerList"></div>
      </div>
      <div>
        <div class="section-label">제외된 선수</div>
        <div class="excluded-panel">
          <div class="excluded-tags" id="excludedTags"><span style="color:var(--color-text-faint);font-size:var(--text-xs)">제외된 선수가 없습니다</span></div>
          <div class="excluded-count" id="excludedCount">총 0명 제외됨 (전체 62명 중)</div>
          <button class="clear-all-btn" id="clearExcludeBtn">전체 해제</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ANALYSIS TAB -->
  <div id="tab-analysis" class="tab-panel">
    <div class="prob-table-wrap">
      <div class="prob-table-header">
        <div>
          <div class="prob-table-title">구단별 기피 선수 제외 확률 분석</div>
          <div class="prob-table-sub" id="analysisSubtitle">제외 선수 0명 · 구단 선택 후 유효 선수 획득 확률 순위</div>
        </div>
        <div style="display:flex;gap:var(--space-3);font-size:var(--text-xs);color:var(--color-text-muted);align-items:center;flex-wrap:wrap">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--color-primary);display:inline-block"></span>전체</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--color-orange);display:inline-block"></span>투수</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:var(--color-success);display:inline-block"></span>타자</span>
        </div>
      </div>
      <div id="probTableContainer"></div>
    </div>
  </div>
</div>

<script>
const TEAMS = [
  { id:'doosan', name:'두산 베어스', emoji:'🐻', shortName:'두산',
    pitchers:['니퍼트','박철순'], batters:['김현수B','김동주B','홍성흔','우즈'] },
  { id:'samsung', name:'삼성 라이온즈', emoji:'🦁', shortName:'삼성',
    pitchers:['김시진','오승환','배영수','임기효'], batters:['장효조','류중일','이승엽','이만수','최형우','양준혁','박한이'] },
  { id:'hanwha', name:'한화 이글스', emoji:'🦅', shortName:'한화',
    pitchers:['류현진','구대성','정민철','송진우'], batters:['김태균S','장종훈'] },
  { id:'lotte', name:'롯데 자이언츠', emoji:'🕊️', shortName:'롯데',
    pitchers:['최동원','윤학길'], batters:['박정태','마해영','손아섭','강민호','이대호','전준호B'] },
  { id:'kia', name:'KIA 타이거즈', emoji:'🐅', shortName:'KIA',
    pitchers:['양현종','선동열','조계현','이강철'], batters:['이범호','김성한B','이순철','한대화','이종범','장성호'] },
  { id:'kiwoom', name:'키움 히어로즈', emoji:'🦸', shortName:'키움',
    pitchers:['정명원','정민태'], batters:['박병호','심정수','박재홍','박진만'] },
  { id:'lg', name:'LG 트윈스', emoji:'👯', shortName:'LG',
    pitchers:['이상훈C','김용수'], batters:['김재현S','이병규B','박용택','백인천','김재박'] },
  { id:'ssg', name:'SSG 랜더스', emoji:'🛸', shortName:'SSG',
    pitchers:['김원형','김광현'], batters:['김기태S','정근우','최정','박경완'] },
  { id:'kt', name:'KT 위즈', emoji:'⚡', shortName:'KT',
    pitchers:[], batters:[] },
  { id:'nc', name:'NC 다이노스', emoji:'🦕', shortName:'NC',
    pitchers:[], batters:['양의지','이호준B'] }
];

const ALL_PLAYERS = [];
TEAMS.forEach(t => {
  t.pitchers.forEach(p => ALL_PLAYERS.push({name:p,type:'투수',teamId:t.id,teamName:t.name,teamEmoji:t.emoji,teamShort:t.shortName}));
  t.batters.forEach(p => ALL_PLAYERS.push({name:p,type:'타자',teamId:t.id,teamName:t.name,teamEmoji:t.emoji,teamShort:t.shortName}));
});

let selectedTeam = null;
let excludedNames = new Set();
let history = [];
let isRolling = false;
let activeFilterTeam = 'all';

// ── TAB SWITCHING ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'analysis') renderProbTable();
  });
});

// ── TEAM GRID (scout tab) ──
const teamsGrid = document.getElementById('teamsGrid');
TEAMS.forEach(t => {
  const total = t.pitchers.length + t.batters.length;
  const btn = document.createElement('button');
  btn.className = 'team-btn';
  btn.dataset.id = t.id;
  btn.innerHTML = `<span class="team-emoji">${t.emoji}</span><span class="team-name">${t.shortName}</span><span class="team-count">${total}명</span>`;
  btn.addEventListener('click', () => selectTeam(t));
  teamsGrid.appendChild(btn);
});

function selectTeam(team) {
  selectedTeam = team;
  document.querySelectorAll('.team-btn').forEach(b => b.classList.toggle('selected', b.dataset.id === team.id));
  const total = team.pitchers.length + team.batters.length;
  const validInTeam = [...team.pitchers, ...team.batters].filter(n => !excludedNames.has(n)).length;
  if (team.id === 'kt') {
    document.getElementById('probSelected').textContent = '100%';
    document.getElementById('probSelectedDetail').textContent = `레전드 선수 없음 → 전체 풀에서 뽑기`;
    document.getElementById('probOtherValue').textContent = '—';
    document.getElementById('probOtherLabel').textContent = '타 구단 확률';
    document.getElementById('probOtherDetail').textContent = `전체 ${62 - excludedNames.size}명에서 균등 추첨`;
  } else {
    document.getElementById('probSelected').textContent = '55%';
    document.getElementById('probSelectedDetail').textContent = `${total}명 중 유효 ${validInTeam}명 (투수 ${team.pitchers.filter(n=>!excludedNames.has(n)).length} / 타자 ${team.batters.filter(n=>!excludedNames.has(n)).length})`;
    document.getElementById('probOtherValue').textContent = '45%';
    document.getElementById('probOtherLabel').textContent = '타 구단 확률';
    const otherValid = ALL_PLAYERS.filter(p => p.teamId !== team.id && !excludedNames.has(p.name)).length;
    document.getElementById('probOtherDetail').textContent = `타 구단 유효 ${otherValid}명 중 무작위`;
  }
  const scoutBtn = document.getElementById('scoutBtn');
  scoutBtn.disabled = false;
  scoutBtn.textContent = `${team.emoji} ${team.name} 레전드 스카우트 하기`;
  updatePoolInfo();
}

function updatePoolInfo() {
  const total = 62 - excludedNames.size;
  document.getElementById('probPool').textContent = total + '명';
  document.getElementById('probPoolDetail').textContent = `제외 선수 ${excludedNames.size}명`;
  if (selectedTeam) selectTeam(selectedTeam);
}

// ── SCOUT LOGIC ──
function scout() {
  if (!selectedTeam || isRolling) return;
  const isKT = selectedTeam.id === 'kt';
  const validInTeam = isKT ? [] : ALL_PLAYERS.filter(p => p.teamId === selectedTeam.id && !excludedNames.has(p.name));
  const validOther = isKT
    ? ALL_PLAYERS.filter(p => !excludedNames.has(p.name))
    : ALL_PLAYERS.filter(p => p.teamId !== selectedTeam.id && !excludedNames.has(p.name));
  if (validInTeam.length === 0 && validOther.length === 0) {
    alert('유효한 선수가 없습니다. 제외 선수를 줄여주세요.');
    return;
  }
  isRolling = true;
  document.getElementById('scoutBtn').disabled = true;

  const allValid = [...ALL_PLAYERS.filter(p => !excludedNames.has(p.name))];
  const resultArea = document.getElementById('resultArea');
  let rollCount = 0;
  const rollInterval = setInterval(() => {
    const rp = allValid[Math.floor(Math.random() * allValid.length)];
    resultArea.innerHTML = `<div class="result-card rolling"><div style="text-align:center;padding:var(--space-4)"><div style="font-size:2.5rem;margin-bottom:var(--space-2)">${rp.teamEmoji}</div><div style="font-size:var(--text-xl);font-weight:700">${rp.name}</div><div style="font-size:var(--text-sm);color:var(--color-text-muted)">${rp.type}</div></div></div>`;
    rollCount++;
    if (rollCount >= 18) { clearInterval(rollInterval); finalizeScout(validInTeam, validOther); }
  }, 80);
}

function finalizeScout(validInTeam, validOther) {
  let pickedPlayer, isFromSelected;
  // Adjust 55%/45% if one pool is empty
  let p55 = validInTeam.length > 0 ? 0.55 : 0;
  let p45 = validOther.length > 0 ? 0.45 : 0;
  const total = p55 + p45;
  if (total === 0) return;
  const rand = Math.random() * total;
  if (rand < p55) {
    pickedPlayer = validInTeam[Math.floor(Math.random() * validInTeam.length)];
    isFromSelected = true;
  } else {
    pickedPlayer = validOther[Math.floor(Math.random() * validOther.length)];
    isFromSelected = false;
  }
  showResult(pickedPlayer, isFromSelected);
  addHistory(pickedPlayer, isFromSelected);
  isRolling = false;
  const scoutBtn = document.getElementById('scoutBtn');
  scoutBtn.disabled = false;
  scoutBtn.textContent = `${selectedTeam.emoji} ${selectedTeam.name} 레전드 스카우트 하기`;
}

function showResult(player, isFromSelected) {
  const isUnwanted = excludedNames.has(player.name); // shouldn't happen but safe check
  const isKTResult = selectedTeam && selectedTeam.id === 'kt';
  const srcBadge = isKTResult
    ? `<span class="result-source source-other">⚡ KT 전체 풀 (100%)</span>`
    : isFromSelected
      ? `<span class="result-source source-selected">선택 구단 (55%)</span>`
      : `<span class="result-source source-other">타 구단 (45%)</span>`;
  const roleBadge = player.type === '투수'
    ? `<span class="badge badge-pitcher">⚾ 투수</span>`
    : `<span class="badge badge-batter">🏏 타자</span>`;
  document.getElementById('resultArea').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-team"><span class="result-team-emoji">${player.teamEmoji}</span><span class="result-team-name">${player.teamName}</span></div>
        ${srcBadge}
      </div>
      <div class="result-player">${player.name}</div>
      <div class="result-badges">${roleBadge}<span class="badge badge-org">${player.teamName}</span></div>
    </div>`;
}

function addHistory(player, isFromSelected) {
  history.unshift({player, isFromSelected, num: history.length + 1});
  renderHistory();
}
function renderHistory() {
  const list = document.getElementById('historyList');
  if (!history.length) { list.innerHTML = '<div class="history-empty">아직 스카우트 기록이 없습니다</div>'; return; }
  list.innerHTML = history.slice(0,20).map((h,i) =>
    `<div class="history-item ${excludedNames.has(h.player.name)?'history-unwanted':''}">
      <span class="history-num">${history.length-i}</span>
      <span class="history-emoji">${h.player.teamEmoji}</span>
      <span class="history-player">${h.player.name}</span>
      <span class="history-meta">${h.player.type === '투수' ? '⚾ 투수' : '🏏 타자'} · ${h.player.teamShort}</span>
      <span class="history-source-dot ${h.isFromSelected?'dot-selected':'dot-other'}" title="${h.isFromSelected?'선택 구단':'타 구단'}"></span>
    </div>`).join('');
}
document.getElementById('scoutBtn').addEventListener('click', scout);
document.getElementById('clearHistoryBtn').addEventListener('click', () => { history=[]; renderHistory(); });

// ── EXCLUDE TAB ──
function buildFilterTabs() {
  const container = document.getElementById('filterTabs');
  container.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'filter-tab' + (activeFilterTeam==='all'?' active':'');
  all.textContent = '전체';
  all.addEventListener('click', () => { activeFilterTeam='all'; buildFilterTabs(); renderPlayerList(); });
  container.appendChild(all);
  TEAMS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-tab' + (activeFilterTeam===t.id?' active':'');
    btn.textContent = t.emoji + ' ' + t.shortName;
    btn.addEventListener('click', () => { activeFilterTeam=t.id; buildFilterTabs(); renderPlayerList(); });
    container.appendChild(btn);
  });
}

function renderPlayerList() {
  const list = document.getElementById('playerList');
  const filtered = activeFilterTeam === 'all'
    ? ALL_PLAYERS
    : ALL_PLAYERS.filter(p => p.teamId === activeFilterTeam);
  list.innerHTML = filtered.map(p => {
    const ex = excludedNames.has(p.name);
    return `<div class="player-item ${ex?'excluded':''}" data-name="${p.name}" role="checkbox" aria-checked="${ex}" tabindex="0">
      <div class="player-item-check">${ex?'<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
      <span class="player-item-name">${p.name}</span>
      <span class="player-item-role">${p.type==='투수'?'⚾':'🏏'}</span>
      <span class="player-item-team">${p.teamEmoji}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.player-item').forEach(item => {
    const toggle = () => toggleExclude(item.dataset.name);
    item.addEventListener('click', toggle);
    item.addEventListener('keydown', e => { if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle();} });
  });
}

function toggleExclude(name) {
  if (excludedNames.has(name)) excludedNames.delete(name);
  else excludedNames.add(name);
  renderPlayerList();
  renderExcludedTags();
  updatePoolInfo();
  renderHistory(); // update strikethrough
}

function renderExcludedTags() {
  const container = document.getElementById('excludedTags');
  if (excludedNames.size === 0) {
    container.innerHTML = '<span style="color:var(--color-text-faint);font-size:var(--text-xs)">제외된 선수가 없습니다</span>';
  } else {
    container.innerHTML = [...excludedNames].map(name =>
      `<span class="excluded-tag">${name}<span class="excluded-tag-remove" data-name="${name}" title="제외 해제">✕</span></span>`
    ).join('');
    container.querySelectorAll('.excluded-tag-remove').forEach(btn => {
      btn.addEventListener('click', () => toggleExclude(btn.dataset.name));
    });
  }
  document.getElementById('excludedCount').textContent = `총 ${excludedNames.size}명 제외됨 (전체 62명 중 유효 ${62 - excludedNames.size}명)`;
}

document.getElementById('clearExcludeBtn').addEventListener('click', () => {
  excludedNames.clear();
  renderPlayerList();
  renderExcludedTags();
  updatePoolInfo();
  renderHistory();
});

buildFilterTabs();
renderPlayerList();
renderExcludedTags();

// ── ANALYSIS TABLE ──
function calcProb(chosenTeamId) {
  const team = TEAMS.find(t => t.id === chosenTeamId);
  if (chosenTeamId === 'kt') {
    const allWanted = ALL_PLAYERS.filter(p => !excludedNames.has(p.name));
    const allP = allWanted.filter(p => p.type==='투수').length;
    const allB = allWanted.filter(p => p.type==='타자').length;
    const allT = allWanted.length;
    const base = 62;
    return {
      total: allT > 0 ? (allT / base) * 100 : 0,
      pitcher: allP > 0 ? (allP / base) * 100 : 0,
      batter: allB > 0 ? (allB / base) * 100 : 0,
      teamWanted: 0, teamWantedP: 0, teamWantedB: 0,
      unwantedInTeam: 0, isKT: true
    };
  }
  const teamAll = [...team.pitchers, ...team.batters];
  const teamTotal = teamAll.length;
  const teamWantedP = team.pitchers.filter(n => !excludedNames.has(n)).length;
  const teamWantedB = team.batters.filter(n => !excludedNames.has(n)).length;
  const teamWanted = teamWantedP + teamWantedB;

  const otherAll = ALL_PLAYERS.filter(p => p.teamId !== chosenTeamId);
  const otherTotal = otherAll.length;
  const otherWantedP = otherAll.filter(p => p.type==='투수' && !excludedNames.has(p.name)).length;
  const otherWantedB = otherAll.filter(p => p.type==='타자' && !excludedNames.has(p.name)).length;
  const otherWanted = otherWantedP + otherWantedB;

  const tT = teamTotal > 0 ? teamWanted / teamTotal : 0;
  const oT = otherTotal > 0 ? otherWanted / otherTotal : 0;
  const tP = teamTotal > 0 ? teamWantedP / teamTotal : 0;
  const oP = otherTotal > 0 ? otherWantedP / otherTotal : 0;
  const tB = teamTotal > 0 ? teamWantedB / teamTotal : 0;
  const oB = otherTotal > 0 ? otherWantedB / otherTotal : 0;

  return {
    total: (0.55 * tT + 0.45 * oT) * 100,
    pitcher: (0.55 * tP + 0.45 * oP) * 100,
    batter: (0.55 * tB + 0.45 * oB) * 100,
    teamWanted, teamWantedP, teamWantedB,
    unwantedInTeam: teamAll.filter(n => excludedNames.has(n)).length
  };
}

function renderProbTable() {
  const container = document.getElementById('probTableContainer');
  document.getElementById('analysisSubtitle').textContent =
    `제외 선수 ${excludedNames.size}명 · 구단 선택 후 유효 선수 획득 확률 순위`;

  const rows = TEAMS.map(t => {
    const prob = calcProb(t.id);
    return { team: t, ...prob };
  }).sort((a, b) => b.total - a.total);

  const maxTotal = Math.max(...rows.map(r => r.total));
  const maxP = Math.max(...rows.map(r => r.pitcher));
  const maxB = Math.max(...rows.map(r => r.batter));

  const rankClass = i => i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';

  container.innerHTML = `<table>
    <thead>
      <tr>
        <th>순위</th>
        <th>구단</th>
        <th colspan="2">전체 확률</th>
        <th colspan="2">투수 확률</th>
        <th colspan="2">타자 확률</th>
        <th class="center">구단내 유효</th>
        <th class="center">제외 수</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map((r, i) => {
        const rc = rankClass(i);
        const fmtPct = v => v < 0.01 ? '<span class="zero-prob">0%</span>' : v.toFixed(1)+'%';
        const bar = (v, max, cls) => `<div class="prob-bar"><div class="prob-bar-fill ${cls}" style="width:${max>0?(v/max*100):0}%"></div></div>`;
        const unwantedChip = r.unwantedInTeam > 0 ? `<span class="unwanted-chip">-${r.unwantedInTeam}</span>` : '';
        return `<tr class="${rc}">
          <td><span class="rank-badge">${i+1}</span></td>
          <td><div class="team-cell"><span class="team-cell-emoji">${r.team.emoji}</span><span class="team-cell-name">${r.team.shortName}</span>${unwantedChip}${r.isKT?'<span style="font-size:10px;color:var(--color-text-faint);margin-left:4px">전체풀</span>':''}</div></td>
          <td><div class="prob-bar-wrap">${bar(r.total,maxTotal,'fill-total')}<span class="prob-num" style="color:var(--color-primary)">${fmtPct(r.total)}</span></div></td>
          <td></td>
          <td><div class="prob-bar-wrap">${bar(r.pitcher,maxP,'fill-pitcher')}<span class="prob-num" style="color:var(--color-orange)">${fmtPct(r.pitcher)}</span></div></td>
          <td></td>
          <td><div class="prob-bar-wrap">${bar(r.batter,maxB,'fill-batter')}<span class="prob-num" style="color:var(--color-success)">${fmtPct(r.batter)}</span></div></td>
          <td></td>
          <td class="center">${r.isKT?'<span style="color:var(--color-text-faint);font-size:var(--text-xs)">전체 62명</span>':`<span style="font-weight:600">${r.teamWanted}</span><span style="color:var(--color-text-muted);font-size:var(--text-xs)"> (⚾${r.teamWantedP}·🏏${r.teamWantedB})</span>`}</td>
          <td class="center">${r.unwantedInTeam > 0 ? `<span style="color:var(--color-error);font-weight:600">${r.unwantedInTeam}명</span>` : '<span style="color:var(--color-text-faint)">—</span>'}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

renderProbTable();

// ── THEME TOGGLE ──
(function(){
  const t = document.querySelector('[data-theme-toggle]');
  const r = document.documentElement;
  let d = r.getAttribute('data-theme') || 'dark';
  function updateIcon(){t.innerHTML=d==='dark'?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>':'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';}
  updateIcon();
  t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);updateIcon();});
})();
</script>
</body>
</html>
