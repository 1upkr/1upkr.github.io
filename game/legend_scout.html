<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👻 레전드 스카우트 시뮬레이터 ⚾</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --bg:#f4f2ee;--surface:#faf9f6;--s2:#fff;--soff:#edeae4;--sdyn:#e2dfd9;
  --border:rgba(0,0,0,.1);--div:rgba(0,0,0,.07);
  --text:#1a1814;--tm:#706d66;--tf:#b8b5ae;
  --primary:#d03228;--primary-h:#b02520;--primary-hl:#fae8e7;
  --gold:#c9880a;--green:#2a7130;--blue:#1251a3;
  --sh-sm:0 1px 3px rgba(0,0,0,.08);--sh-md:0 4px 16px rgba(0,0,0,.11);--sh-lg:0 12px 36px rgba(0,0,0,.16);
  --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-2xl:1.5rem;--r-full:9999px;
  --font:"Satoshi",sans-serif;--tr:180ms cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
  --bg:#111009;--surface:#181714;--s2:#1e1c19;--soff:#1b1a17;--sdyn:#27251f;
  --border:rgba(255,255,255,.09);--div:rgba(255,255,255,.05);
  --text:#e6e3de;--tm:#898680;--tf:#504e49;
  --primary:#e55248;--primary-h:#f0625a;--primary-hl:#3a1a18;
  --gold:#f0b22a;--green:#5caa60;--blue:#5ea0f5;
  --sh-sm:0 1px 3px rgba(0,0,0,.45);--sh-md:0 4px 16px rgba(0,0,0,.55);--sh-lg:0 12px 36px rgba(0,0,0,.65);
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font);font-size:16px;color:var(--text);background:var(--bg);line-height:1.6}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;transition:all var(--tr)}
.wrap{max-width:740px;margin:0 auto;padding:20px 16px 60px}

/* ── Header ── */
.topbar{display:flex;justify-content:flex-end;margin-bottom:10px}
.theme-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-full);border:1px solid var(--border);font-size:1.1rem;color:var(--tm)}
.theme-btn:hover{background:var(--sdyn)}
.header{text-align:center;margin-bottom:28px;padding:16px 0 8px}
.header-emoji{font-size:2.6rem;margin-bottom:8px;line-height:1}
.header-title{font-size:clamp(1.5rem,4vw,2rem);font-weight:900;letter-spacing:-.03em;margin-bottom:6px}
.header-sub{font-size:.85rem;color:var(--tm)}

/* ── Section label ── */
.sec-label{font-size:.7rem;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}

/* ── Stadium grid ── */
.st-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:24px}
@media(max-width:460px){.st-grid{grid-template-columns:repeat(3,1fr)}}
.st-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;border-radius:var(--r-xl);background:var(--surface);border:2px solid var(--border);transition:all var(--tr)}
.st-btn:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--sh-sm)}
.st-btn.sel{border-color:var(--primary);background:var(--primary-hl);box-shadow:var(--sh-md)}
.st-emoji{font-size:1.5rem;line-height:1.2}
.st-city{font-size:.72rem;font-weight:700;text-align:center}
.st-team{font-size:.62rem;color:var(--tm);text-align:center}

/* ── Scout button ── */
.scout-btn{width:100%;padding:15px;background:var(--primary);color:#fff;font-size:1rem;font-weight:700;border-radius:var(--r-2xl);box-shadow:var(--sh-md);margin-bottom:24px;letter-spacing:-.01em;overflow:hidden;position:relative}
.scout-btn::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.13),transparent 55%)}
.scout-btn:hover:not(:disabled){background:var(--primary-h);transform:translateY(-2px);box-shadow:var(--sh-lg)}
.scout-btn:active:not(:disabled){transform:none}
.scout-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ── Result area ── */
.result-area{min-height:160px;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.result-empty{color:var(--tf);font-size:.9rem;text-align:center;padding:24px;line-height:2.2}

/* Result card */
.result-card{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-2xl);box-shadow:var(--sh-md);overflow:hidden;animation:pop .38s cubic-bezier(.16,1,.3,1)}
@keyframes pop{from{opacity:0;transform:scale(.9) translateY(12px)}to{opacity:1;transform:none}}
.rc-top{padding:14px 20px 0;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
.rc-stadium{font-size:.75rem;font-weight:700;color:var(--tm)}
.rc-prob{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:var(--r-full)}
.rc-prob.high{background:color-mix(in oklab,var(--gold) 16%,var(--soff));color:var(--gold)}
.rc-prob.norm{background:var(--sdyn);color:var(--tm)}
.rc-body{padding:14px 20px 20px}
.rc-name{font-size:clamp(1.8rem,5vw,2.4rem);font-weight:900;letter-spacing:-.03em;line-height:1.1;margin-bottom:10px}
.rc-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:var(--r-full)}
.b-team{background:color-mix(in oklab,var(--blue) 14%,var(--soff));color:var(--blue)}
.b-win{background:color-mix(in oklab,var(--green) 14%,var(--soff));color:var(--green)}

/* Rolling */
.rolling-card{width:100%;background:var(--s2);border:2px solid var(--primary);border-radius:var(--r-2xl);padding:28px 20px;text-align:center;box-shadow:var(--sh-lg)}
.rolling-name{font-size:clamp(1.6rem,5vw,2.2rem);font-weight:900;letter-spacing:-.03em;animation:flicker .15s steps(1) infinite}
@keyframes flicker{0%{opacity:.2}50%{opacity:.95}100%{opacity:.2}}
.rolling-team{font-size:.8rem;color:var(--tm);margin-top:6px}

/* ── Odds panel ── */
.odds-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:24px}
.odds-hd{padding:12px 16px;border-bottom:1px solid var(--div);display:flex;justify-content:space-between;align-items:center;gap:8px}
.odds-title{font-size:.78rem;font-weight:700}
.odds-sub{font-size:.7rem;color:var(--tm)}
.odds-body{padding:10px 16px;display:flex;flex-direction:column;gap:5px;max-height:220px;overflow-y:auto}
.odds-body::-webkit-scrollbar{width:3px}
.odds-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--r-full)}
.odds-row{display:flex;align-items:center;gap:8px}
.odds-emo{font-size:.85rem;flex-shrink:0;width:18px;text-align:center}
.odds-name{font-size:.73rem;font-weight:600;min-width:52px}
.odds-team-label{font-size:.65rem;color:var(--tm);min-width:42px}
.odds-bar-wrap{flex:1;display:flex;align-items:center;gap:5px}
.odds-bar{height:5px;background:var(--sdyn);border-radius:var(--r-full);flex:1;overflow:hidden}
.odds-bar-fill{height:100%;border-radius:var(--r-full);transition:width .5s cubic-bezier(.16,1,.3,1)}
.fill-h{background:linear-gradient(90deg,var(--primary),var(--gold))}
.fill-n{background:var(--tf)}
.odds-pct{font-size:.7rem;font-weight:700;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}

/* ── History ── */
.hist-section{border-top:1px solid var(--div);padding-top:20px}
.hist-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.clear-btn{font-size:.75rem;color:var(--tm);padding:4px 8px;border-radius:var(--r-sm)}
.clear-btn:hover{color:var(--primary)}
.hist-list{display:flex;flex-direction:column;gap:6px}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);animation:pop .2s ease}
.hist-num{font-size:.65rem;color:var(--tf);min-width:16px;text-align:right;flex-shrink:0}
.hist-emoji{font-size:1.1rem;flex-shrink:0}
.hist-player{font-size:.875rem;font-weight:700;flex:1;min-width:0}
.hist-origin{font-size:.72rem;color:var(--tm);flex-shrink:0}
.hist-venue{font-size:.68rem;color:var(--tf);flex-shrink:0;white-space:nowrap}
.hist-pct{font-size:.67rem;color:var(--tf);font-variant-numeric:tabular-nums;flex-shrink:0}
.hist-empty{font-size:.875rem;color:var(--tf);text-align:center;padding:20px}
</style>
</head>

// ── 구장 버튼 렌더 ──
const grid=document.getElementById('stadiumGrid');
STADIUMS.forEach(s=>{
  const b=document.createElement('button');
  b.className='st-btn'; b.dataset.id=s.id;
  b.innerHTML=`<span class="st-emoji">${s.emoji}</span><span class="st-city">${s.name}</span><span class="st-team">${s.team}</span>`;
  b.addEventListener('click',()=>selectStadium(s));
  grid.appendChild(b);
});

let selStadium=null, hist=[], rolling=false;

function selectStadium(s){
  selStadium=s;
  document.querySelectorAll('.st-btn').forEach(b=>b.classList.toggle('sel',b.dataset.id===s.id));
  const btn=document.getElementById('scoutBtn');
  btn.disabled=false;
  btn.textContent=`${s.emoji} ${s.name} 레전드 뽑기! 🎉`;
  renderOdds(s.id);
}

function renderOdds(sid){
  const players=DATA[sid];
  const maxP=Math.max(...players.map(p=>p.p));
  document.getElementById('oddsTitle').textContent=`🎲 확률 목록 (총 ${players.length}명)`;
  const homeTeams=players.filter(p=>p.p===maxP).map(p=>go(p.n).t).filter((v,i,a)=>a.indexOf(v)===i).join('·');
  document.getElementById('oddsSub').textContent=`🏠 홈 보너스: ${homeTeams}`;
  document.getElementById('oddsBody').innerHTML=players.map(p=>{
    const isH=p.p===maxP; const o=go(p.n);
    return `<div class="odds-row">
      <span class="odds-emo">${o.e}</span>
      <span class="odds-name">${p.n}</span>
      <span class="odds-team-label">${o.t}</span>
      <div class="odds-bar-wrap">
        <div class="odds-bar"><div class="odds-bar-fill ${isH?'fill-h':'fill-n'}" style="width:${(p.p/maxP*100).toFixed(1)}%"></div></div>
      </div>
      <span class="odds-pct">${p.p.toFixed(2)}%</span>
    </div>`;
  }).join('');
  document.getElementById('oddsWrap').style.display='';
}

document.getElementById('scoutBtn').addEventListener('click',doScout);

let lastPicked=null, lastStadium=null;
function doScout(){
  if(!selStadium||rolling) return;
  rolling=true;
  document.getElementById('scoutBtn').disabled=true;
  const pool=DATA[selStadium.id];
  const area=document.getElementById('resultArea');

  const iv=setInterval(()=>{
    const rp=pool[Math.floor(Math.random()*pool.length)];
    area.innerHTML=`<div class="rolling-card">
      <div class="rolling-name">${go(rp.n).e} ${rp.n}</div>
      <div class="rolling-team">${go(rp.n).t}</div>
    </div>`;
  },80);

  setTimeout(()=>{
    clearInterval(iv);
    const total=pool.reduce((s,p)=>s+p.p,0);
    let r=Math.random()*total, picked=pool[pool.length-1];
    for(const p of pool){r-=p.p; if(r<=0){picked=p;break;}}
    lastPicked=picked; lastStadium=selStadium;
    hist.unshift({player:picked, stadium:selStadium});
    renderHist();
    showResult(picked);
    rolling=false;
    document.getElementById('scoutBtn').disabled=false;
    document.getElementById('scoutBtn').textContent=`${selStadium.emoji} ${selStadium.name}(${selStadium.team}) 레전드 뽑기! 🎉`;
  },1400);
}

function showResult(p){
  const pool=DATA[lastStadium.id];
  const maxP=Math.max(...pool.map(x=>x.p));
  const isH=p.p===maxP;
  const o=go(p.n);
  document.getElementById('resultArea').innerHTML=`
    <div class="result-card">
      <div class="rc-top">
        <div class="rc-stadium">${lastStadium.emoji} 선택 구장: ${lastStadium.name}(${lastStadium.team})</div>
        <span class="rc-prob ${isH?'high':'norm'}">${isH?'🌟 홈 보너스':'일반'} ${p.p.toFixed(2)}%</span>
      </div>
      <div class="rc-body">
        <div class="rc-name">${o.e} ${p.n}</div>
        <div class="rc-badges">
          <span class="badge b-team">${o.e} 원소속: ${o.t}</span>
          <span class="badge b-win">⭐ 레전드 획득!</span>
        </div>
      </div>
    </div>`;
}

function renderHist(){
  const el=document.getElementById('histList');
  if(!hist.length){el.innerHTML='<div class="hist-empty">아직 뽑은 선수가 없어요 😊</div>';return;}
  el.innerHTML=hist.slice(0,20).map((h,i)=>{
    const o=go(h.player.n);
    return `<div class="hist-item">
      <span class="hist-num">${hist.length-i}</span>
      <span class="hist-emoji">${o.e}</span>
      <span class="hist-player">${h.player.n}</span>
      <span class="hist-origin">${o.t}</span>
      <span class="hist-venue">선택 구장(${h.stadium.name})</span>
      <span class="hist-pct">${h.player.p.toFixed(2)}%</span>
    </div>`;
  }).join('');
}

document.getElementById('clearBtn').addEventListener('click',()=>{hist=[];lastPicked=null;renderHist();});

// ── 테마 토글 ──
(function(){
  const btn=document.querySelector('[data-theme-toggle]'),root=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  root.setAttribute('data-theme',d);
  btn.textContent=d==='dark'?'☀️':'🌙';
  btn.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark';
    root.setAttribute('data-theme',d);
    btn.textContent=d==='dark'?'☀️':'🌙';
  });
})();
</script>
