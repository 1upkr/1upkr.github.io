---
layout: null
---
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>ꜰ ɪ ɴ ᴀ ɴ ᴄ ᴇ : ¹ ᴜ ᴘ</title>
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="https://1up.kr/assets/pacman-svg.svg">

      <meta property="og:title" content="ꜰ ɪ ɴ ᴀ ɴ ᴄ ᴇ : ¹ ᴜ ᴘ" />
      <meta property="og:description" content="ʙᴜɪʟᴅ ʏᴏᴜʀ ᴏᴡɴ ꜱᴛᴏᴄᴋ ᴅᴀꜱʜʙᴏᴀʀᴅ. ꜱᴇᴛ ᴄᴜꜱᴛᴏᴍ, ᴀɴᴅ ꜱᴛᴀʏ ᴀʜᴇᴀᴅ ᴏꜰ ᴛʜᴇ ᴍᴀʀᴋᴇᴛ ᴡɪᴛʜ 1ᴜᴘ." />
      <meta property="og:image" content="https://1up.kr/assets/finance_1up.png" />
      <meta property="og:url" content="https://1up.kr/f.html" />
      <meta property="og:type" content="website" />
      <meta property="og:image:width" content="1200" />
      <meta property="og:image:height" content="630" />
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <link rel="stylesheet" href="https://1up.kr/finance/style.css?ver=3.4.9">
</head>
<body>
    <script>
        if (localStorage.getItem('marketdash_active_tab') === 'news') {
            document.body.classList.add('show-news');
        }
    </script>

    <header>
        <div class="header-left">
            <h1>F I N A N C E : ¹ U P</h1>
        </div>
        <div class="header-controls">
            <div class="timer" title="Auto Refresh">
                <svg class="progress-pie" viewBox="0 0 24 24">
                    <circle class="progress-pie__bg" cx="12" cy="12" r="10" />
                    <circle class="progress-pie__fill" id="timer-pie" cx="12" cy="12" r="5" />
                </svg>
            </div>
            <div class="action-btns">
                <button id="btn-refresh" class="icon-btn" title="Force Refresh">
                    <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                </button>
                <div class="settings-wrapper">
                    <button id="btn-settings-toggle" class="icon-btn" title="Settings" onclick="toggleSettingsMenu()">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </button>
                    <div class="settings-dropdown" id="settings-dropdown">
                        <button class="dropdown-item" onclick="exportSettings()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export Config</button>
                        <button class="dropdown-item" onclick="triggerImport()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import Config</button>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item" onclick="resetToDefaults()"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>Reset Everything</button>
                        <button class="dropdown-item" onclick="toggleThemeDropdown()"><svg class="theme-icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg><svg class="theme-icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>Switch Theme</button>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item" onclick="openAboutModal()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>Credits</button>
                    </div>
                </div>
                <input type="file" id="import-file" accept=".json" style="display:none" onchange="importSettings(event)">
            </div>
        </div>
    </header>

    <div class="mobile-tabs hide-desktop">
        <button class="tab-btn" id="tab-btn-dashboard" onclick="switchMobileTab('dashboard')">Watchlist</button>
        <button class="tab-btn" id="tab-btn-news" onclick="switchMobileTab('news')">News</button>
    </div>

    <script>
        if (localStorage.getItem('marketdash_active_tab') === 'news') {
            document.getElementById('tab-btn-news').classList.add('active');
        } else {
            document.getElementById('tab-btn-dashboard').classList.add('active');
        }
    </script>

    <main id="main-layout">
        <div id="left-col">
            <div id="dashboard"></div>
        </div>
        
        <div id="right-col">
            <div class="section-container news-section-container">
                <div class="section-header">
                    <div class="section-header-left">
                        <h2>📰 Scoped in</h2>
                    </div>
                    <div class="section-header-right">
                        <div id="news-spinner" class="spinner" style="display: none;">
                            <svg viewBox="0 0 50 50"><circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle></svg>
                        </div>
                    </div>
                </div>
                <div class="news-list" id="news-container">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10l6 6v10a2 2 0 0 1-2 2z"></path><polyline points="15 4 15 10 21 10"></polyline></svg>
                        <p>Loading latest news...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        {{ site.footer }}
    </footer>

    <div class="modal-overlay" id="delete-modal">
        <div class="modal-card">
            <div class="modal-title">Drop Stock</div>
            <div class="modal-desc">Drop <span id="delete-target-ticker"></span> from your list?</div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeDeleteModal()">Keep</button>
                <button class="modal-btn confirm" id="confirm-delete-btn">Drop</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="about-modal">
        <div class="modal-card">
            <div class="modal-title">credits</div>
            <div class="modal-desc" style="text-align: left; padding: 1rem 0;">
                <div style="font-weight: 900; font-size: 1.3rem; color: var(--text-primary); margin-bottom: 0.5rem;">F I N A N C E : ¹ U P</div>
                <div style="margin-bottom: 0.3rem;"><span style="font-weight: 600;">ver.3.4.9</span></div>
                <div><span>N3RD - 1UP YOUR VIBE !!</span></div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeAboutModal()" style="width: 100%;">Done</button>
            </div>
        </div>
    </div>

    <script src="https://1up.kr/finance/appz.js?ver=3.4.9"></script>
</body>
</html>
