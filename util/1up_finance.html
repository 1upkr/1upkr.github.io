<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✔️ finance :: 1up 👻</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            --bg-color: #f3f4f8; --text-primary: #18191a; --text-secondary: #5f6368;
            --card-bg: #ffffff; --border-color: #e2e6eb; --green: #00873c;
            --green-bg: #e6f4ea; --red: #eb0f29; --red-bg: #fce8ea;
            --header-bg: #ffffff; --hover-bg: #f7f9fa; --input-bg: #f0f3f6;
            --btn-bg: #000000; --btn-text: #ffffff; --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        [data-theme="dark"] {
            --bg-color: #121212; --text-primary: #e3e3e3; --text-secondary: #a0a4a8;
            --card-bg: #1e1e1e; --border-color: #2b2b2b; --green: #00c853;
            --red: #ff453a; --header-bg: #1e1e1e; --hover-bg: #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); -webkit-font-smoothing: antialiased; }

        header { background-color: var(--header-bg); border-bottom: 1px solid var(--border-color); padding: 0.8rem 1rem; display: flex; justify-content: space-between; align-items: center; }
        .header-left h1 { font-size: 1.1rem; font-weight: 700; }
        .action-btns { display: flex; gap: 0.5rem; }
        .icon-btn { background: none; border: none; cursor: pointer; padding: 0.4rem; color: var(--text-secondary); }
        
        main { padding: 1rem; max-width: 1000px; margin: 0 auto; }
        .section-container { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 1.5rem; }
        
        /* 모바일 최적화: 가로 스크롤 방지 */
        .table-wrapper { width: 100%; overflow-x: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border-color); }
        
        .handle-col { width: 35px; }
        .drag-handle { cursor: grab; padding: 0.5rem; opacity: 0.5; touch-action: none; }
        
        .asset-col { overflow: hidden; }
        .symbol { font-weight: 600; font-size: 0.9rem; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .name { font-size: 0.7rem; color: var(--text-secondary); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .price { font-size: 0.9rem; font-weight: 600; text-align: right; }
        .badge { font-size: 0.7rem; padding: 0.1rem 0.3rem; border-radius: 4px; display: inline-block; }
        
        .btn-remove { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0.2rem; }
        .btn-remove svg { width: 16px; height: 16px; }

        @media (max-width: 480px) {
            .hide-mobile { display: none; }
            th, td { padding: 0.6rem 0.3rem; }
            .symbol { font-size: 0.8rem; }
            .price { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left"><h1>✔️ finance :: 1up 👻</h1></div>
        <div class="action-btns">
            <button id="btn-refresh" class="icon-btn"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></button>
            <button id="btn-theme" class="icon-btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="23"/></svg></button>
        </div>
    </header>

    <main id="dashboard"></main>

    <script>
        const DEFAULT_WATCHLISTS = {
            indicators: { title: '📈 Market', tickers: ['^GSPC', '^IXIC', '^KS11', 'BTC-USD'] },
            us: { title: '🇺🇸 US', tickers: ['AAPL', 'TSLA', 'NVDA'] },
            kr: { title: '🇰🇷 KR', tickers: ['005930.KS', '035420.KS'] }
        };

        const GAS_PROXY_URL = "https://script.google.com/macros/s/AKfycbzHIRkgH2Sqc_X0RxxrmKrWWdGyF67IW-S5jNL0mTRZ2vGwKT1rbfDzOveoUSg6cH5k/exec";
        
        let state = {
            watchlists: JSON.parse(localStorage.getItem('marketdash_watchlists')) || JSON.parse(JSON.stringify(DEFAULT_WATCHLISTS)),
            sectionOrder: JSON.parse(localStorage.getItem('marketdash_sectionOrder')) || ['indicators', 'us', 'kr']
        };

        function init() {
            renderLayout();
            fetchData();
        }

        function renderLayout() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';

            state.sectionOrder.forEach(sectionId => {
                const section = state.watchlists[sectionId];
                const div = document.createElement('div');
                div.className = 'section-container';
                div.innerHTML = `
                    <div class="section-header"><h2>${section.title}</h2></div>
                    <div class="table-wrapper">
                        <table><tbody id="tbody-${sectionId}"></tbody></table>
                    </div>
                `;
                dashboard.appendChild(div);
                
                const tbody = div.querySelector('tbody');
                section.tickers.forEach(ticker => {
                    tbody.insertAdjacentHTML('beforeend', `
                        <tr data-ticker="${ticker}" data-section="${sectionId}">
                            <td class="handle-col"><div class="drag-handle">⋮⋮</div></td>
                            <td class="left-align">
                                <span class="symbol">${ticker}</span>
                                <span class="name" id="name-${ticker}">Loading...</span>
                            </td>
                            <td class="price" id="price-${ticker}">-</td>
                            <td id="pct-${ticker}">-</td>
                            <td class="hide-mobile" id="vol-${ticker}">-</td>
                        </tr>
                    `);
                });

                Sortable.create(tbody, {
                    handle: '.drag-handle',
                    delay: 150,
                    delayOnTouchOnly: true,
                    onEnd: function() {
                        state.watchlists[sectionId].tickers = Array.from(tbody.querySelectorAll('tr')).map(r => r.dataset.ticker);
                        localStorage.setItem('marketdash_watchlists', JSON.stringify(state.watchlists));
                    }
                });
            });
        }

        async function fetchData() {
            for (const sectionId of state.sectionOrder) {
                const tickers = state.watchlists[sectionId].tickers;
                try {
                    const res = await fetch(`${GAS_PROXY_URL}?symbols=${tickers.join(',')}`);
                    const data = await res.json();
                    data.quoteResponse.result.forEach(q => {
                        document.getElementById(`name-${q.symbol}`).textContent = q.shortName || q.symbol;
                        document.getElementById(`price-${q.symbol}`).textContent = q.regularMarketPrice.toFixed(2);
                        document.getElementById(`pct-${q.symbol}`).innerHTML = `<span class="badge ${q.regularMarketChange >= 0 ? 'up' : 'down'}">${q.regularMarketChangePercent.toFixed(2)}%</span>`;
                    });
                } catch(e) { console.error(e); }
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
