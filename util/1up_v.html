<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✔️ finance :: 1up 👻</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            /* Light Theme */
            --bg-color: #f3f4f8;
            --text-primary: #18191a;
            --text-secondary: #5f6368;
            --card-bg: #ffffff;
            --border-color: #e2e6eb;
            --green: #00873c;
            --green-bg: #e6f4ea;
            --red: #eb0f29;
            --red-bg: #fce8ea;
            --header-bg: #ffffff;
            --hover-bg: #f7f9fa;
            --input-bg: #f0f3f6;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --flash-green: rgba(0, 135, 60, 0.2);
            --flash-red: rgba(235, 15, 41, 0.2);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --drag-bg: rgba(0,0,0,0.02);
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-color: #121212;
            --text-primary: #e3e3e3;
            --text-secondary: #a0a4a8;
            --card-bg: #1e1e1e;
            --border-color: #2b2b2b;
            --green: #00c853;
            --green-bg: rgba(0, 200, 83, 0.15);
            --red: #ff453a;
            --red-bg: rgba(255, 69, 58, 0.15);
            --header-bg: #1e1e1e;
            --hover-bg: #2a2a2a;
            --input-bg: #2b2b2b;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --flash-green: rgba(0, 200, 83, 0.3);
            --flash-red: rgba(255, 69, 58, 0.3);
            --drag-bg: rgba(255,255,255,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            transition: background-color 0.2s, color 0.2s;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Global SVG Icon Style --- */
        svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* --- Header Navigation --- */
        header {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 0.875rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-left h1 {
            font-size: 1.25rem; font-weight: 700;
            display: flex; align-items: center; gap: 0.5rem; letter-spacing: -0.02em;
        }

        .header-controls { display: flex; align-items: center; gap: 1.5rem; font-size: 0.875rem; font-weight: 500; }
        .timer { color: var(--text-secondary); font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 0.4rem; }
        .action-btns { display: flex; flex-direction: row; align-items: center; gap: 0.5rem; }

        .icon-btn {
            background: none; border: none; color: var(--text-secondary); cursor: pointer;
            padding: 0.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .icon-btn:hover { background-color: var(--hover-bg); color: var(--text-primary); }
        .icon-btn svg { width: 18px; height: 18px; }

        /* Dynamic Theme Icons */
        .icon-sun { display: none; }
        .icon-moon { display: block; }
        [data-theme="dark"] .icon-sun { display: block; }
        [data-theme="dark"] .icon-moon { display: none; }

        /* --- Main Content & Cards --- */
        main { padding: 2rem 5%; max-width: 1400px; margin: 0 auto; }

        .section-container {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; margin-bottom: 2rem; overflow: hidden; box-shadow: var(--shadow-md);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* --- Unified Action Icons (+, Drag, Chevron, Trash) --- */
        .action-icon-btn {
            background: none; 
            border: none; 
            color: var(--text-secondary); 
            cursor: pointer;
            padding: 0.4rem; 
            border-radius: 6px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s ease;
        }
        .action-icon-btn svg { width: 18px; height: 18px; }
        .action-icon-btn:hover {
            background-color: var(--hover-bg); 
            color: var(--text-primary);
        }

        /* Drag Handle 특화 옵션 */
        .action-icon-btn.drag-handle { cursor: grab; touch-action: none; opacity: 0.6; }
        .action-icon-btn.drag-handle:active { cursor: grabbing; opacity: 1; }
        .action-icon-btn.drag-handle:hover { opacity: 1; }

        /* Trash 특화 옵션 (Danger) */
        .action-icon-btn.danger:hover { color: var(--red); background-color: var(--red-bg); }

        /* Chevron 특화 옵션 (토글 애니메이션) */
        .action-icon-btn.toggle-btn svg { transition: transform 0.3s ease; }
        .collapsed .action-icon-btn.toggle-btn svg { transform: rotate(-180deg); }
        
        .collapsed .section-body { display: none; }

        .sortable-ghost {
            opacity: 0.6; background-color: var(--drag-bg) !important;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
        }
        .sortable-drag {
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background-color: var(--card-bg) !important;
            cursor: grabbing !important;
        }

        .section-header {
            padding: 1.25rem 1.5rem; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border-color); user-select: none;
        }
        .section-header-left { flex: 1; display: flex; align-items: center; cursor: pointer; }
        .section-header h2 { font-size: 1.125rem; font-weight: 600; }
        
        .section-header-right { display: flex; align-items: center; gap: 0.25rem; }

        /* --- Form & Search Style --- */
        .add-ticker-form {
            display: none; /* 기본 숨김 처리 */
            padding: 0.75rem 1.5rem; gap: 0.75rem;
            border-bottom: 1px solid var(--border-color); background-color: var(--hover-bg); align-items: center;
        }
        .add-ticker-form.active { display: flex; }
        .search-wrapper { position: relative; flex: 1; max-width: 240px; }
        .search-wrapper svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-secondary); }
        .add-ticker-form input {
            width: 100%; padding: 0.5rem 0.75rem 0.5rem 2.2rem; border: 1px solid var(--border-color); border-radius: 8px;
            background-color: var(--card-bg); color: var(--text-primary); font-size: 0.875rem; font-weight: 500; text-transform: uppercase;
        }
        .add-ticker-form input:focus { outline: none; border-color: #0056d2; }
        .add-ticker-form button { background-color: var(--btn-bg); color: var(--btn-text); border: none; padding: 0.5rem 1.25rem; border-radius: 8px; cursor: pointer; font-size: 0.875rem; font-weight: 600; }

        /* --- Table Styling --- */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; white-space: nowrap; }
        th, td { padding: 0.875rem 1.5rem; border-bottom: 1px solid var(--border-color); }
        tr:last-child td { border-bottom: none; }
        
        th { color: var(--text-secondary); font-size: 0.75rem; font-weight: 500; text-transform: uppercase; }
        th.left-align, td.left-align { text-align: left; }
        
        /* 아이콘 컬럼 간격 조정 */
        th.actions-col, td.actions-col { width: 36px; padding-right: 0; padding-left: 0.5rem; text-align: center; }
        th.handle-col, td.handle-col { width: 36px; padding-right: 0.5rem; padding-left: 0; text-align: center; }
