<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>
    <style>
        :root { --bg: #f4f6f8; --card: #ffffff; --text: #111; --up: #008f5d; --down: #d92d20; --border: #e0e0e0; }
        .dark-mode { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section { background: var(--card); border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        .section-header { display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .up { color: var(--up); } .down { color: var(--down); }
        .controls { display: flex; gap: 10px; align-items: center; }
        input { padding: 8px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text); }
        button { padding: 8px 12px; cursor: pointer; border-radius: 4px; border: none; background: #007bff; color: white; }
        @media (max-width: 768px) { .hide-mobile { display: none; } }
    </style>
</head>
<body>

<div class="nav">
    <h1>Market Dashboard</h1>
    <div class="controls">
        <span id="timer">60s</span>
        <button onclick="refreshData()">Refresh</button>
        <button onclick="toggleTheme()">Theme</button>
        <button onclick="resetDefaults()" style="background: var(--down);">Reset</button>
    </div>
</div>

<div id="app"></div>

<script>
    const PROXY = "https://corsproxy.io/?";
    const API = "https://query1.finance.yahoo.com/v7/finance/quote?symbols=";

    let state = JSON.parse(localStorage.getItem('stocks')) || {
        indicators: ['^GSPC', '^IXIC', '^DJI', '^KS11', '^KQ11', 'GC=F', 'CL=F', 'BTC-USD'],
        us: ['AAPL', 'MSFT', 'GOOGL', 'AMZN', 'NVDA', 'TSLA', 'META'],
        kr: ['005930.KS', '000660.KS', '035420.KS', '005380.KS', '035720.KS']
    };

    function save() { localStorage.setItem('stocks', JSON.stringify(state)); }

    async function fetchData(symbols) {
        try {
            const res = await fetch(PROXY + encodeURIComponent(API + symbols.join(',')));
            const data = await res.json();
            return data.quoteResponse.result;
        } catch (e) { return []; }
    }

    function renderSection(title, key) {
        const div = document.createElement('div');
        div.className = 'section';
        div.innerHTML = `
            <div class="section-header" onclick="this.nextElementSibling.classList.toggle('hide-mobile')">
                <span>${title}</span>
                <div class="controls" onclick="event.stopPropagation()">
                    <input id="in-${key}" placeholder="Add ticker...">
                    <button onclick="addTicker('${key}')">+</button>
                </div>
            </div>
            <table>
                <thead><tr><th>Symbol</th><th>Price</th><th>Change %</th><th class="hide-mobile">Market Cap</th></tr></thead>
                <tbody id="body-${key}"></tbody>
            </table>
        `;
        document.getElementById('app').appendChild(div);
    }

    async function updateUI() {
        for (let key in state) {
            const body = document.getElementById(`body-${key}`);
            const data = await fetchData(state[key]);
            body.innerHTML = data.map(s => `
                <tr>
                    <td>${s.symbol}</td>
                    <td>${s.regularMarketPrice?.toFixed(2)}</td>
                    <td class="${s.regularMarketChangePercent >= 0 ? 'up' : 'down'}">
                        ${s.regularMarketChangePercent?.toFixed(2)}%
                    </td>
                    <td class="hide-mobile">${(s.marketCap / 1e9).toFixed(2)}B</td>
                    <td><button onclick="removeTicker('${key}', '${s.symbol}')">×</button></td>
                </tr>
            `).join('');
        }
    }

    function addTicker(key) {
        const val = document.getElementById(`in-${key}`).value.toUpperCase();
        if (val && !state[key].includes(val)) {
            state[key].push(val);
            save();
            updateUI();
        }
    }

    function removeTicker(key, sym) {
        state[key] = state[key].filter(t => t !== sym);
        save();
        updateUI();
    }

    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    function resetDefaults() { localStorage.clear(); location.reload(); }
    
    let countdown = 60;
    setInterval(() => {
        countdown--;
        document.getElementById('timer').innerText = countdown + 's';
        if (countdown <= 0) { refreshData(); }
    }, 1000);

    function refreshData() { countdown = 60; updateUI(); }

    // Init
    ['Market Indicators', 'US Stocks', 'Korean Stocks'].forEach((t, i) => renderSection(t, ['indicators', 'us', 'kr'][i]));
    updateUI();
</script>
</body>
</html>
