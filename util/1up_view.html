<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 금융 시장 대시보드</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --text-color: #e3e6eb;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        header {
            max-width: 1400px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2e39;
            padding-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .update-time {
            font-size: 14px;
            color: #848e9c;
        }

        /* 상단 티커 테이프 */
        .ticker-tape-container {
            max-width: 1400px;
            margin: 0 auto 20px auto;
        }

        /* 메인 대시보드 그리드 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: 250px; /* 차트 높이 확보 */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .grid-section-title {
            grid-column: 1 / -1;
            font-size: 18px;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 5px;
            color: #848e9c;
        }

        /* 차트 컨테이너 크기 지정 */
        .chart-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Market Overview</h1>
        <div class="update-time" id="live-clock">시간 로딩 중...</div>
    </header>

    <!-- 상단 흐르는 실시간 지수 -->
    <div class="ticker-tape-container">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
            "symbols": [
                {"proName": "KRX:KOSPI", "title": "코스피"},
                {"proName": "KRX:KOSDAQ", "title": "코스닥"},
                {"proName": "NASDAQ:IXIC", "title": "나스닥"},
                {"proName": "SP:SPX", "title": "S&P500"},
                {"proName": "FX_IDC:USDKRW", "title": "원/달러"}
            ],
            "showSymbolLogo": true,
            "colorTheme": "dark",
            "isTransparent": true,
            "displayMode": "adaptive",
            "locale": "kr"
            }
            </script>
        </div>
    </div>

    <!-- 대시보드 본문 -->
    <div class="dashboard-grid">
        
        <!-- 1. 국내 지수 및 환율/금 -->
        <div class="grid-section-title">국내 시장 & 거시 지표</div>
        <div class="card"><div id="tv-kospi" class="chart-container"></div></div>
        <div class="card"><div id="tv-kosdaq" class="chart-container"></div></div>
        <div class="card"><div id="tv-usdkrw" class="chart-container"></div></div>
        <div class="card"><div id="tv-krwgold" class="chart-container"></div></div>
        <div class="card"><div id="tv-kr10y" class="chart-container"></div></div>

        <!-- 2. 국내 주요 주식 -->
        <div class="grid-section-title">국내 주요 기업</div>
        <div class="card"><div id="tv-samsung" class="chart-container"></div></div>
        <div class="card"><div id="tv-hynix" class="chart-container"></div></div>
        <div class="card"><div id="tv-lge" class="chart-container"></div></div>
        <div class="card"><div id="tv-hyundai" class="chart-container"></div></div>

        <!-- 3. 글로벌 지수 및 선물/원자재 -->
        <div class="grid-section-title">글로벌 지수 & 원자재</div>
        <div class="card"><div id="tv-ndxfut" class="chart-container"></div></div>
        <div class="card"><div id="tv-nasdaq" class="chart-container"></div></div>
        <div class="card"><div id="tv-sp500" class="chart-container"></div></div>
        <div class="card"><div id="tv-dow" class="chart-container"></div></div>
        <div class="card"><div id="tv-wti" class="chart-container"></div></div>
        <div class="card"><div id="tv-us10y" class="chart-container"></div></div>

        <!-- 4. 미국 주요 주식 및 ETF -->
        <div class="grid-section-title">미국 주식 & ETF & 크립토</div>
        <div class="card"><div id="tv-nvda" class="chart-container"></div></div>
        <div class="card"><div id="tv-tsla" class="chart-container"></div></div>
        <div class="card"><div id="tv-aapl" class="chart-container"></div></div>
        <div class="card"><div id="tv-tqqq" class="chart-container"></div></div>
        <div class="card"><div id="tv-spy" class="chart-container"></div></div>
        <div class="card"><div id="tv-soxl" class="chart-container"></div></div>
        <div class="card"><div id="tv-btc" class="chart-container"></div></div>

    </div>

    <script>
        // 트레이딩뷰 위젯 동적 생성 함수
        const assets = [
            { id: "tv-kospi", symbol: "KRX:KOSPI" },
            { id: "tv-kosdaq", symbol: "KRX:KOSDAQ" },
            { id: "tv-usdkrw", symbol: "FX_IDC:USDKRW" },
            { id: "tv-krwgold", symbol: "FX_IDC:XAUKRW" },
            { id: "tv-kr10y", symbol: "TVC:KR10Y" },
            { id: "tv-samsung", symbol: "KRX:005930" },
            { id: "tv-hynix", symbol: "KRX:000660" },
            { id: "tv-lge", symbol: "KRX:066570" },
            { id: "tv-hyundai", symbol: "KRX:005380" },
            { id: "tv-ndxfut", symbol: "CME:NQ1!" },
            { id: "tv-nasdaq", symbol: "NASDAQ:IXIC" },
            { id: "tv-sp500", symbol: "SP:SPX" },
            { id: "tv-dow", symbol: "DJ:DJI" },
            { id: "tv-wti", symbol: "TVC:USOIL" },
            { id: "tv-us10y", symbol: "TVC:US10Y" },
            { id: "tv-nvda", symbol: "NASDAQ:NVDA" },
            { id: "tv-tsla", symbol: "NASDAQ:TSLA" },
            { id: "tv-aapl", symbol: "NASDAQ:AAPL" },
            { id: "tv-tqqq", symbol: "NASDAQ:TQQQ" },
            { id: "tv-spy", symbol: "AMEX:SPY" },
            { id: "tv-soxl", symbol: "AMEX:SOXL" },
            { id: "tv-btc", symbol: "BINANCE:BTCUSD" }
        ];

        assets.forEach(asset => {
            const container = document.getElementById(asset.id);
            if (!container) return;

            // 위젯 HTML 구조 세팅
            container.innerHTML = `
                <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
                    <div class="tradingview-widget-container__widget" style="height: 100%; width: 100%;"></div>
                </div>
            `;

            // 실제 트레이딩뷰 스크립트 주입 (Mini Symbol Overview)
            const script = document.createElement('script');
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js';
            script.type = 'text/javascript';
            script.async = true;
            script.innerHTML = JSON.stringify({
                "symbol": asset.symbol,
                "width": "100%",
                "height": "100%",
                "locale": "kr",
                "dateRange": "1M",
                "colorTheme": "dark",
                "isTransparent": true,
                "autosize": true,
                "largeChartUrl": ""
            });

            container.querySelector('.tradingview-widget-container').appendChild(script);
        });

        // 실시간 시계 업데이트 로직
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = "현재 시간: " + now.toLocaleString('ko-KR');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
