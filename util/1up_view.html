<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Stock Market Dashboard</title>
  <meta
    name="description"
    content="Yahoo Finance–inspired real-time stock dashboard with Korean stocks, US stocks, and market indicators."
  />
  <style>
    :root {
      --bg: #0b0f17;
      --bg-elevated: #121927;
      --panel: #141c2c;
      --panel-2: #0f1522;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --text: #edf2ff;
      --muted: #9aa7bd;
      --muted-2: #7f8ca3;
      --green: #00c076;
      --red: #ff5b6e;
      --amber: #ffbe55;
      --blue: #5aa2ff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      --chip: rgba(255, 255, 255, 0.06);
      --input-bg: rgba(255, 255, 255, 0.04);
      --skeleton-a: rgba(255, 255, 255, 0.06);
      --skeleton-b: rgba(255, 255, 255, 0.12);
    }

    html[data-theme="light"] {
      --bg: #f4f7fb;
      --bg-elevated: #ffffff;
      --panel: #ffffff;
      --panel-2: #f9fbff;
      --border: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.12);
      --text: #122033;
      --muted: #5f6f86;
      --muted-2: #7b8ba3;
      --green: #0a9b5d;
      --red: #d94d60;
      --amber: #c78512;
      --blue: #286cff;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      --chip: rgba(15, 23, 42, 0.05);
      --input-bg: rgba(15, 23, 42, 0.03);
      --skeleton-a: rgba(15, 23, 42, 0.05);
      --skeleton-b: rgba(15, 23, 42, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(90, 162, 255, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(0, 192, 118, 0.08), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 20px;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      margin-bottom: 18px;
      background: color-mix(in srgb, var(--bg-elevated) 88%, transparent);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .brand {
      min-width: 0;
    }

    .brand-kicker {
      margin: 0 0 4px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 6px 0 0;
      font-size: 14px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip,
    .btn,
    .theme-toggle {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--chip);
      color: var(--text);
      height: 42px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 0 14px;
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
    }

    .btn,
    .theme-toggle,
    .icon-btn {
      appearance: none;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover,
    .theme-toggle:hover,
    .icon-btn:hover,
    .section-toggle:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
    }

    .btn:disabled,
    .theme-toggle:disabled,
    .icon-btn:disabled {
      opacity: 0.6;
      cursor: wait;
      transform: none;
    }

    .btn,
    .theme-toggle {
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .btn-primary {
      background: linear-gradient(180deg, rgba(90, 162, 255, 0.22), rgba(90, 162, 255, 0.12));
      border-color: rgba(90, 162, 255, 0.35);
    }

    .theme-toggle .icon {
      font-size: 16px;
    }

    .sections {
      display: grid;
      gap: 18px;
    }

    .panel {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .section-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 16px;
      background: transparent;
      color: var(--text);
      border: 0;
      cursor: pointer;
      text-align: left;
    }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .section-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(90, 162, 255, 0.12);
      border: 1px solid rgba(90, 162, 255, 0.18);
      font-size: 18px;
    }

    .section-title-wrap h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .section-title-wrap p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .section-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .section-count {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .chevron {
      font-size: 18px;
      color: var(--muted);
      transition: transform 0.2s ease;
    }

    .panel[data-expanded="false"] .chevron {
      transform: rotate(-90deg);
    }

    .section-body {
      padding: 0 18px 18px;
    }

    .panel[data-expanded="false"] .section-body {
      display: none;
    }

    .section-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .add-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      width: 100%;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1 1 420px;
      min-width: 0;
    }

    .ticker-input {
      flex: 1;
      min-width: 0;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      padding: 0 14px;
      outline: none;
      font-size: 14px;
    }

    .ticker-input:focus {
      border-color: rgba(90, 162, 255, 0.45);
      box-shadow: 0 0 0 3px rgba(90, 162, 255, 0.12);
    }

    .status-text {
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .status-text.success {
      color: var(--green);
    }

    .status-text.error {
      color: var(--red);
    }

    .status-text.pending {
      color: var(--amber);
    }

    .grid-head,
    .ticker-row {
      display: grid;
      grid-template-columns: minmax(200px, 2.3fr) minmax(110px, 1fr) minmax(140px, 1.1fr) minmax(110px, 0.9fr) minmax(120px, 1fr) minmax(130px, 1.1fr) 52px;
      gap: 12px;
      align-items: center;
