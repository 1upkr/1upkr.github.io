<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 금융 시장 대시보드</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --text-color: #e3e6eb;
            --accent-color: #2962ff;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        header {
            max-width: 1400px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2e39;
            padding-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .update-time {
            font-size: 14px;
            color: #848e9c;
        }

        /* 상단 티커 테이프 */
        .ticker-tape-container {
            max-width: 1400px;
            margin: 0 auto 20px auto;
        }

        /* 메인 대시보드 그리드 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: 220px;
            box-sizing: border-box;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            padding-left: 5px;
            color: #ef5350; /* 기본 포인트 컬러 */
        }

        /* 카테고리별 헤더 스타일링 (선택 사항) */
        .grid-section-title {
            grid-column: 1 / -1;
            font-size: 18px;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #848e9c;
        }
    </style>
</head>
<body>

    <header>
        <h1>Market Overview</h1>
        <div class="update-time" id="live-clock">실시간 연결 중...</div>
    </header>

    <!-- 상단 흐르는 실시간 지수 (티커 테이프) -->
    <div class="ticker-tape-container">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
            "symbols": [
                {"proName": "KRX:KOSPI", "title": "코스피"},
                {"proName": "KRX:KOSDAQ", "title": "코스닥"},
                {"proName": "NASDAQ:IXIC", "title": "나스닥"},
                {"proName": "SP:SPX", "title": "S&P500"},
                {"proName": "FX_IDC:USDKRW", "title": "원/달러"}
            ],
            "showSymbolLogo": true,
            "colorTheme": "dark",
            "isTransparent": false,
            "displayMode": "adaptive",
            "locale": "ko"
            }
            </script>
        </div>
    </div>

    <!-- 대시보드 본문 -->
    <div class="dashboard-grid">
        
        <!-- 1. 국내 지수 및 환율/금 -->
        <div class="grid-section-title">국내 시장 & 거시 지표</div>
        <div class="card"><div id="tv-kospi"></div></div>
        <div class="card"><div id="tv-kosdaq"></div></div>
        <div class="card"><div id="tv-usdkrw"></div></div>
        <div class="card"><div id="tv-krwgold"></div></div>
        <div class="card"><div id="tv-kr10y"></div></div>

        <!-- 2. 국내 주요 주식 -->
        <div class="grid-section-title">국내 주요 기업</div>
        <div class="card"><div id="tv-samsung"></div></div>
        <div class="card"><div id="tv-hynix"></div></div>
        <div class="card"><div id="tv-lge"></div></div>
        <div class="card"><div id="tv-hyundai"></div></div>

        <!-- 3. 글로벌 지수 및 선물/원자재 -->
        <div class="grid-section-title">글로벌 지수 & 원자재</div>
        <div class="card"><div id="tv-ndxfut"></div></div>
        <div class="card"><div id="tv-nasdaq"></div></div>
        <div class="card"><div id="tv-sp500"></div></div>
        <div class="card"><div id="tv-dow"></div></div>
        <div class="card"><div id="tv-wti"></div></div>
        <div class="card"><div id="tv-us10y"></div></div>

        <!-- 4. 미국 주요 주식 및 ETF -->
        <div class="grid-section-title">미국 주식 & ETF & 크립토</div>
        <div class="card"><div id="tv-nvda"></div></div>
        <div class="card"><div id="tv-tsla"></div></div>
        <div class="card"><div id="tv-aapl"></div></div>
        <div class="card"><div id="tv-tqqq"></div></div>
        <div class="card"><div id="tv-spy"></div></div>
        <div class="card"><div id="tv-soxl"></div></div>
        <div class="card"><div id="tv-btc"></div></div>

    </div>

    <!-- 트레이딩뷰 실시간 미니 차트 로드 스크립트 -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        function createMiniChart(containerId, symbol, displayName) {
            new TradingView.MiniWidget({
                "container_id": containerId,
                "symbol": symbol,
                "width": "100%",
                "height": "100%",
                "locale": "ko",
                "dateRange": "1M",
                "colorTheme": "dark",
                "trendLineColor": "rgba(41, 98, 255, 1)",
                "underLineColor": "rgba(41, 98, 255, 0.3)",
                "underLineBottomColor": "rgba(41, 98, 255, 0)",
                "isTransparent": true,
                "autosize": false,
                "largeChartUrl": ""
            });
        }

        // 22개 자산 매핑 실행
        // 국내 시장 & 거시
        createMiniChart("tv-kospi", "KRX:KOSPI");
        createMiniChart("tv-kosdaq", "KRX:KOSDAQ");
        createMiniChart("tv-usdkrw", "FX_IDC:USDKRW");
        createMiniChart("tv-krwgold", "FX_IDC:XAUKRW"); // KRW 금현물 대체
        createMiniChart("tv-kr10y", "TVC:KR10Y"); // 국고채 10년

        // 국내 기업
        createMiniChart("tv-samsung", "KRX:005930");
        createMiniChart("tv-hynix", "KRX:000660");
        createMiniChart("tv-lge", "KRX:066570");
        createMiniChart("tv-hyundai", "KRX:005380");

        // 글로벌 지수 & 원자재
        createMiniChart("tv-ndxfut", "CME:NQ1!"); // 나스닥 100 선물
        createMiniChart("tv-nasdaq", "NASDAQ:IXIC");
        createMiniChart("tv-sp500", "SP:SPX");
        createMiniChart("tv-dow", "DJ:DJI");
        createMiniChart("tv-wti", "TVC:USOIL"); // WTI 원유
        createMiniChart("tv-us10y", "TVC:US10Y"); // 미국채 10년

        // 미국 주식 & ETF & 크립토
        createMiniChart("tv-nvda", "NASDAQ:NVDA");
        createMiniChart("tv-tsla", "NASDAQ:TSLA");
        createMiniChart("tv-aapl", "NASDAQ:AAPL");
        createMiniChart("tv-tqqq", "NASDAQ:TQQQ");
        createMiniChart("tv-spy", "AMEX:SPY");
        createMiniChart("tv-soxl", "AMEX:SOXL");
        createMiniChart("tv-btc", "BINANCE:BTCUSD");


        // 상단 시계 기능
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = "현재 시간: " + now.toLocaleString('ko-KR');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
