<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<style>

  /* ① Press Start 2P — 라틴·숫자·기호·공통 기호 */
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  /* ② Neo둥근모 — 한글 전용 (unicode-range 제한) */
  @font-face {
    font-family: 'PixelUI';
    src: url('//cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.600/neodgm/NeoDunggeunmo.woff2') format('woff2'),
         url('//cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.600/neodgm/NeoDunggeunmo.woff')  format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
    unicode-range:
      U+AC00-D7A3,   /* 한글 음절 */
      U+1100-11FF,   /* 한글 자모 */
      U+3130-318F,   /* 호환 자모 */
      U+A960-A97F,   /* 한글 자모 확장-A */
      U+D7B0-D7FF;   /* 한글 자모 확장-B */
  }

  /* ③ Press Start 2P — 라틴·숫자·기호 전용 (unicode-range 제한) */
  @font-face {
    font-family: 'PixelUI';
    src: url('https://fonts.gstatic.com/s/pressstart2p/v16/e3t4euO8T-267oIAQAu6jDQyK3nVivM.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
    unicode-range:
      U+0020-007E,   /* Basic Latin (영문 대소문자·숫자·기호) */
      U+00A0-00FF,   /* Latin-1 Supplement */
      U+2010-205F,   /* 일반 구두점 */
      U+2190-21FF,   /* 화살표 */
      U+25A0-25FF;   /* 기하학적 도형 (▶ 등) */
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* PC 기준 크기 — 가독성 우선 */
    --fs-label:   10px;
    --fs-status:  13px;
    --fs-detected:14px;
    --fs-note:    11px;
    --fs-btn:     12px;
    --fs-badge:   10px;
  }

  @media (max-width: 960px) {
    :root {
      --fs-label:    9px;
      --fs-status:  11px;
      --fs-detected:12px;
      --fs-note:     9px;
      --fs-btn:     10px;
      --fs-badge:    9px;
    }
  }

  @media (max-width: 600px) {
    :root {
      --fs-label:    8px;
      --fs-status:   9px;
      --fs-detected:10px;
      --fs-note:     8px;
      --fs-btn:      9px;
      --fs-badge:    8px;
    }
  }

  body {
    font-family: 'PixelUI', 'Press Start 2P', monospace;
    background: #0a0a0a;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  body::before {
    content: '';
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── BOX ── */
  .box {
    border: 4px solid #00ff41;
    box-shadow: 6px 6px 0 #00ff41;
    padding: 52px 56px;
    text-align: center;
    max-width: 560px;
    width: 90%;
    position: relative;
  }

  .box::before {
    content: '[ REDIRECTING ]';
    position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
    background: #0a0a0a; color: #ffe600;
    font-family: 'Press Start 2P', monospace; /* 영문 전용 pseudo */
    font-size: var(--fs-label);
    padding: 0 16px;
    letter-spacing: 0.12em;
    text-shadow: 0 0 6px #ffe600;
    white-space: nowrap;
  }

  /* ── STATUS LINE ── */
  .status {
    font-size: var(--fs-status);
    color: #00ff41;
    text-shadow: 0 0 6px #00ff41;
    letter-spacing: 0.07em;
    line-height: 2.4;
    margin-bottom: 24px;
    word-break: keep-all;
  }

  /* ── DETECTED INFO ── */
  .lang-detected {
    font-size: var(--fs-detected);
    color: #ffe600;
    text-shadow: 0 0 5px #ffe600;
    letter-spacing: 0.05em;
    line-height: 2.6;
    margin-bottom: 36px;
    word-break: keep-all;
    min-height: 2lh; /* 레이아웃 고정 */
  }

  /* ── 언어 감지 배지 ── */
  .badge {
    display: inline-block;
    background: #001a0a;
    border: 1px solid #00ff41;
    color: #00ff41;
    font-size: var(--fs-badge);
    padding: 4px 12px;
    margin-bottom: 14px;
    letter-spacing: 0.1em;
    text-shadow: 0 0 4px #00ff41;
  }

  /* ── DOTS ANIMATION ── */
  .dots span {
    animation: dot-blink 1.2s step-end infinite;
    color: #00ff41;
    text-shadow: 0 0 4px #00ff41;
  }
  .dots span:nth-child(2) { animation-delay: 0.4s; }
  .dots span:nth-child(3) { animation-delay: 0.8s; }
  @keyframes dot-blink { 0%,100%{opacity:0} 50%{opacity:1} }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    width: 100%;
    height: 6px;
    background: #1a1a1a;
    border: 1px solid #333;
    margin: 0 0 36px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: #00ff41;
    box-shadow: 0 0 6px #00ff41;
    animation: progress-fill 1.2s linear forwards;
  }
  @keyframes progress-fill { from { width: 0% } to { width: 100% } }

  /* ── MANUAL LINKS ── */
  .manual-links {
    margin-top: 4px;
    border-top: 1px dashed #333;
    padding-top: 24px;
  }

  .manual-links p {
    font-size: var(--fs-note);
    color: #555;
    margin-bottom: 18px;
    letter-spacing: 0.05em;
    line-height: 2.5;
    word-break: keep-all;
  }

  .manual-links a {
    display: inline-block;
    font-family: 'PixelUI', 'Press Start 2P', monospace;
    font-size: var(--fs-btn);
    color: #000;
    background: #00ff41;
    text-decoration: none;
    padding: 14px 24px;
    margin: 5px;
    box-shadow: 3px 3px 0 #005a1a;
    letter-spacing: 0.06em;
    line-height: 2;
    transition: all 0.05s;
    word-break: keep-all;
    white-space: nowrap;
  }
  .manual-links a:hover {
    background: #ffe600;
    box-shadow: 1px 1px 0 #5a4800;
    transform: translate(2px, 2px);
  }
  .manual-links a.en {
    background: #00cfff;
    box-shadow: 3px 3px 0 #004a5a;
  }
  .manual-links a.en:hover {
    background: #ffe600;
    box-shadow: 1px 1px 0 #5a4800;
  }
</style>
</head>
<body>

<div class="box">
  <div class="status" id="status-msg">
    DETECTING LANGUAGE<span class="dots"><span>.</span><span>.</span><span>.</span></span>
  </div>

  <div class="lang-detected" id="lang-msg">&nbsp;</div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="manual-links">
    <p>[ 자동 이동이 되지 않을 경우 ]<br>언어를 직접 선택해 주세요</p>
    <a href="acquisition_k.html">&#9658; 한국어</a>
    <a href="acquisition_e.html" class="en">&#9658; ENGLISH</a>
  </div>
</div>

<script>
(function () {
  'use strict';

  var DELAY = 2000;

  var statusEl  = document.getElementById('status-msg');
  var langEl    = document.getElementById('lang-msg');

  /* 브라우저 언어 목록 수집 */
  var langs = [];
  if (navigator.languages && navigator.languages.length) {
    langs = Array.prototype.slice.call(navigator.languages);
  } else if (navigator.language) {
    langs = [navigator.language];
  } else if (navigator.userLanguage) {
    langs = [navigator.userLanguage];
  }

  /* 한국어 판별 */
  var isKorean = langs.some(function (l) {
    return l.toLowerCase().indexOf('ko') === 0;
  });

  var detected   = (langs[0] || 'unknown').toUpperCase();
  var targetFile = isKorean ? 'acquisition_k.html' : 'acquisition_e.html';

  /* 언어별 안내 메시지 */
  var detectedMsg = isKorean
    ? '<span class="badge">[ ' + detected + ' ]</span><br>한국어 환경이 감지되었습니다<br>acquisition_k.html 로 이동합니다'
    : '<span class="badge">[ ' + detected + ' ]</span><br>English / Other detected<br>Redirecting to acquisition_e.html';

  var redirectMsg = isKorean
    ? '페이지를 이동하는 중입니다...'
    : 'REDIRECTING NOW...';

  /* UI 업데이트 */
  statusEl.innerHTML = 'LANGUAGE DETECTED <span class="dots"><span>.</span><span>.</span><span>.</span></span>';
  langEl.innerHTML   = detectedMsg;

  /* 리다이렉트 */
  setTimeout(function () {
    statusEl.textContent = redirectMsg;
    window.location.replace(targetFile);
  }, DELAY);

})();
</script>

</body>
</html>
