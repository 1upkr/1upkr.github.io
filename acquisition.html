<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Press Start 2P', monospace;
    background: #0a0a0a;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .box {
    border: 4px solid #00ff41;
    box-shadow: 6px 6px 0 #00ff41;
    padding: 48px 52px;
    text-align: center;
    max-width: 480px;
    width: 90%;
    position: relative;
  }

  .box::before {
    content: '[ REDIRECTING ]';
    position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
    background: #0a0a0a; color: #ffe600;
    font-size: 9px; padding: 0 14px;
    letter-spacing: 0.12em; text-shadow: 0 0 6px #ffe600; white-space: nowrap;
  }

  .status {
    font-size: 10px;
    color: #00ff41;
    text-shadow: 0 0 6px #00ff41;
    letter-spacing: 0.08em;
    line-height: 2.4;
    margin-bottom: 28px;
  }

  .lang-detected {
    font-size: 9px;
    color: #ffe600;
    text-shadow: 0 0 4px #ffe600;
    letter-spacing: 0.06em;
    line-height: 2.2;
    margin-bottom: 32px;
  }

  .spinner {
    display: inline-block;
    font-size: 11px;
    color: #00ff41;
    letter-spacing: 0.1em;
    animation: none;
  }

  .dots span {
    animation: dot-blink 1.2s step-end infinite;
    color: #00ff41;
    text-shadow: 0 0 4px #00ff41;
  }
  .dots span:nth-child(2) { animation-delay: 0.4s; }
  .dots span:nth-child(3) { animation-delay: 0.8s; }
  @keyframes dot-blink { 0%,100%{opacity:0} 50%{opacity:1} }

  .manual-links {
    margin-top: 28px;
    border-top: 1px dashed #333;
    padding-top: 24px;
  }
  .manual-links p {
    font-size: 8px;
    color: #555;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
    line-height: 2.2;
  }
  .manual-links a {
    display: inline-block;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #000;
    background: #00ff41;
    text-decoration: none;
    padding: 10px 18px;
    margin: 4px;
    box-shadow: 3px 3px 0 #005a1a;
    letter-spacing: 0.05em;
    transition: all 0.05s;
  }
  .manual-links a:hover {
    background: #ffe600;
    box-shadow: 1px 1px 0 #5a4800;
    transform: translate(2px,2px);
  }
  .manual-links a.en {
    background: #00cfff;
    box-shadow: 3px 3px 0 #004a5a;
    color: #000;
  }
  .manual-links a.en:hover {
    background: #ffe600;
    box-shadow: 1px 1px 0 #5a4800;
  }
</style>
</head>
<body>

<div class="box">
  <div class="status" id="status-msg">DETECTING LANGUAGE<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
  <div class="lang-detected" id="lang-msg">&nbsp;</div>
  <div class="manual-links">
    <p>[ AUTO-REDIRECT FAILED? ]<br>CHOOSE YOUR LANGUAGE MANUALLY</p>
    <a href="acquisition_k.html">&#9658; 한국어</a>
    <a href="acquisition_e.html" class="en">&#9658; ENGLISH</a>
  </div>
</div>

<script>
(function () {
  'use strict';

  var DELAY = 1200; // 감지 후 리다이렉트까지 대기 시간 (ms)

  var statusEl = document.getElementById('status-msg');
  var langEl   = document.getElementById('lang-msg');

  // 브라우저 언어 목록 수집
  var langs = [];
  if (navigator.languages && navigator.languages.length) {
    langs = Array.prototype.slice.call(navigator.languages);
  } else if (navigator.language) {
    langs = [navigator.language];
  } else if (navigator.userLanguage) {
    langs = [navigator.userLanguage];
  }

  // 한국어 여부 판별 (ko, ko-KR, ko-KP 등)
  var isKorean = langs.some(function (l) {
    return l.toLowerCase().indexOf('ko') === 0;
  });

  var detected   = langs[0] || 'unknown';
  var targetFile = isKorean ? 'acquisition_k.html' : 'acquisition_e.html';
  var targetLabel = isKorean
    ? '한국어 (Korean) — acquisition_k.html'
    : 'English / Other — acquisition_e.html';

  // UI 업데이트
  statusEl.innerHTML = 'LANGUAGE DETECTED <span class="dots"><span>.</span><span>.</span><span>.</span></span>';
  langEl.innerHTML   = '[ ' + detected.toUpperCase() + ' ]<br>' + targetLabel;

  // 리다이렉트
  setTimeout(function () {
    statusEl.textContent = 'REDIRECTING NOW...';
    window.location.replace(targetFile);
  }, DELAY);

})();
</script>

</body>
</html>
